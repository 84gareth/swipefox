<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SwipeFox</title>

<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=VT323&display=swap)" rel="stylesheet">

<style>
    :root {
        --snes-light: #526fbc;
        --snes-purple: #903ec1;
        --snes-cyan: #00d2ff;
        --snes-green: #4ade80;
        --snes-gold: #ffe08a;
    }
    body {
        margin:0; padding:0;
        background:black;
        overflow:hidden;
        font-family:'VT323', monospace;
        color:white;
        touch-action:none;
        user-select:none;
    }

    /* Title Screen */
    #overlay {
        position:absolute;
        width:100%;
        height:100%;
        background:radial-gradient(circle, #1a1a1a 0%, #000 100%);
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        z-index:10;
    }
    #title {
        font-size:72px;
        letter-spacing:4px;
        background:linear-gradient(0deg, #bbb, #fff);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        text-shadow:4px 4px #000;
        margin:0;
    }
    #subtitle {
        color:var(--snes-light);
        font-size:24px;
        margin-top:-10px;
        letter-spacing:3px;
    }
    #start-btn {
        padding:20px 60px;
        margin-top:40px;
        font-size:32px;
        background:linear-gradient(135deg, var(--snes-light), #304e9c);
        border:none;
        border-radius:12px;
        box-shadow:0 6px #000;
        color:white;
    }
    #start-btn:active {
        transform:translateY(4px);
        box-shadow:0 2px #000;
    }

    /* HUD */
    #ui {
        position:absolute;
        top:10px;
        width:100%;
        display:none;
        flex-direction:column;
        align-items:center;
        pointer-events:none;
        z-index:5;
    }
    .hud-row {
        width:90%;
        display:flex;
        justify-content:space-between;
        font-size:24px;
        text-shadow:2px 2px #000;
    }
    #timer {
        margin-top:6px;
        font-size:42px;
        color:var(--snes-green);
        text-shadow:3px 3px #000;
    }
</style>
</head>
<body>

<div id="overlay">
    <h1 id="title">SwipeFox</h1>
    <h2 id="subtitle">SURVIVAL PROTOCOL</h2>
    <button id="start-btn" onclick="startGame()">INITIALIZE</button>
</div>

<div id="ui">
    <div class="hud-row">
        <div>KILLS: <span id="kills">000</span></div>
        <div>BEST: <span id="best">000</span></div>
    </div>
    <div id="timer">00:00</div>
</div>

<script src="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js)"></script>

<script>
/* ------------------------------------------
   GAME STATE
------------------------------------------ */
let kills = 0;
let best = localStorage.getItem("swipefox_best") || 0;
document.getElementById("best").innerText = String(best).padStart(3, "0");

let running = false;
let startTime = 0;

let shipSpeed = 1.0;
let boostActive = false;
let brakeActive = false;

let targetX = 0;
let targetY = 3;
let isVertical = false;

/* ------------------------------------------
   THREE.JS INITIALIZATION
------------------------------------------ */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000010, 0.018);

const cam = new THREE.PerspectiveCamera(75,
    window.innerWidth / window.innerHeight, 0.1, 1000);

cam.position.set(0, 2, 12);
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* Lighting */
scene.add(new THREE.AmbientLight(0xffffff, 1.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(6, 10, 10);
scene.add(dirLight);

/* ------------------------------------------
   PLAYER SHIP (Flat‑shaded, SNES style)
------------------------------------------ */
const shipGroup = new THREE.Group();

const bodyMat = new THREE.MeshPhongMaterial({ color:0x00d2ff, flatShading:true });
const body = new THREE.Mesh(new THREE.ConeGeometry(0.8, 2.5, 4), bodyMat);
body.rotation.x = Math.PI / 2;
shipGroup.add(body);

const wings = new THREE.Mesh(
    new THREE.BoxGeometry(3.2, 0.12, 0.9),
    new THREE.MeshPhongMaterial({ color:0x3a7bd5, flatShading:true })
);
shipGroup.add(wings);

scene.add(shipGroup);

/* ------------------------------------------
   STARFIELD
------------------------------------------ */
const stars = [];
for (let i=0; i<250; i++) {
    const s = new THREE.Mesh(
        new THREE.SphereGeometry(0.08),
        new THREE.MeshBasicMaterial({ color:0xffffff })
    );
    s.position.set(
        (Math.random()-0.5)*200,
        (Math.random()-0.5)*100,
        Math.random()*-300
    );
    scene.add(s);
    stars.push(s);
}

/* ------------------------------------------
   ENEMY SYSTEM
------------------------------------------ */
const enemies = [];

function spawnEnemy() {
    const geo = new THREE.OctahedronGeometry(1.3);
    const mat = new THREE.MeshPhongMaterial({ color:0xff416c, flatShading:true });
    const e = new THREE.Mesh(geo, mat);

    e.position.set(
        (Math.random()-0.5)*30,
        (Math.random()-0.5)*14 + 3,
        -200
    );
    e.userData = { hp: 3 + Math.floor(timeAlive()*0.5) };

    scene.add(e);
    enemies.push(e);
}

/* ------------------------------------------
   BULLETS
------------------------------------------ */
const bullets = [];
function fireBullet() {
    if (!running) return;

    const b = new THREE.Mesh(
        new THREE.BoxGeometry(0.25,0.25,1),
        new THREE.MeshBasicMaterial({ color:0xffffff })
    );
    b.position.copy(shipGroup.position);
    bullets.push(b);
    scene.add(b);
}

/* Auto-fire */
setInterval(() => fireBullet(), 200);

/* ------------------------------------------
   INPUT: DRAG + SWIPES
------------------------------------------ */
let touchStartY = 0;
let lastTap = 0;

window.addEventListener("touchstart", e=>{
    touchStartY = e.touches[0].clientY;
    let t = Date.now();
    if (t - lastTap < 250) doBarrelRoll();
    lastTap = t;
});

window.addEventListener("touchmove", e=>{
    const t = e.touches[0];

    targetX = ((t.clientX / window.innerWidth) * 2 - 1) * 12;
    targetY = (-(t.clientY / window.innerHeight) * 2 + 1) * 8 + 3;

    isVertical = Math.abs(targetX) > 8;
});

window.addEventListener("touchend", e=>{
    isVertical = false;
    boostActive = false;
    brakeActive = false;
});

/* SPEED CONTROL */
window.addEventListener("touchend", e=>{
    const dy = e.changedTouches[0].clientY - touchStartY;

    if (dy < -60) activateBoost();
    if (dy > 60) activateBrake();
});

/* ------------------------------------------
   BOOST / BRAKE
------------------------------------------ */
function activateBoost() {
    boostActive = true;
    shipSpeed = 2.5;
    setTimeout(()=>{ boostActive=false; shipSpeed=1.0; }, 3000);
}

function activateBrake() {
    brakeActive = true;
    shipSpeed = 0.4;
    setTimeout(()=>{ brakeActive=false; shipSpeed=1.0; }, 3000);
}

/* ------------------------------------------
   BARREL ROLL (visual only for now)
------------------------------------------ */
function doBarrelRoll() {
    // Placeholder animation
    shipGroup.rotation.z += Math.PI * 2;
}

/* ------------------------------------------
   UTILS
------------------------------------------ */
function timeAlive() {
    return (Date.now() - startTime) / 1000;
}

/* ------------------------------------------
   GAME LOOP
------------------------------------------ */
function animate() {
    if (!running) return;
    requestAnimationFrame(animate);

    /* Timer */
    const t = timeAlive();
    const mm = String(Math.floor(t/60)).padStart(2,'0');
    const ss = String(Math.floor(t%60)).padStart(2,'0');
    document.getElementById("timer").innerText = mm + ":" + ss;

    const speedScale = shipSpeed + t * 0.005;

    /* Move Ship */
    shipGroup.position.x += (targetX - shipGroup.position.x) * 0.15;
    shipGroup.position.y += (targetY - shipGroup.position.y) * 0.15;

    shipGroup.rotation.z += ((isVertical ? Math.PI/2 : 0) - shipGroup.rotation.z) * 0.2;

    /* Stars */
    stars.forEach(s=>{
        s.position.z += 1.5 * speedScale;
        if (s.position.z > 10) s.position.z = -300;
    });

    /* Bullets */
    bullets.forEach((b,i)=>{
        b.position.z -= 6;
        if (b.position.z < -400) {
            scene.remove(b);
            bullets.splice(i,1);
        }
    });

    /* Enemies */
    enemies.forEach((e,i)=>{
        e.position.z += 1.5 * speedScale;

        if (e.position.distanceTo(shipGroup.position) < 2) {
            gameOver();
        }

        bullets.forEach((b,bi)=>{
            if (b.position.distanceTo(e.position) < 2) {
                e.userData.hp--;
                scene.remove(b);
                bullets.splice(bi,1);

                if (e.userData.hp <= 0) {
                    scene.remove(e);
                    enemies.splice(i,1);
                    kills++;
                    document.getElementById("kills").innerText =
                      String(kills).padStart(3,'0');
                }
            }
        });
    });

    renderer.render(scene, cam);
}

/* ------------------------------------------
   SPAWN LOOP
------------------------------------------ */
setInterval(()=>{ if (running) spawnEnemy(); }, 1000);

/* ------------------------------------------
   START + END
------------------------------------------ */
function startGame() {
    running = true;
    kills = 0;

    document.getElementById("overlay").style.display = "none";
    document.getElementById("ui").style.display = "flex";

    startTime = Date.now();
    animate();
}

function gameOver() {
    running = false;

    if (kills > best) {
        best = kills;
        localStorage.setItem("swipefox_best", best);
    }

    location.reload();
}
</script>
</body>
</html>
