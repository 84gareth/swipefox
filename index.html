<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Endless Saga — Battle Square</title>
<meta name="description" content="A Final Fantasy VII Gold Saucer–inspired roguelike battle arena. Survive eight battles, spin the handicap reels, and choose how to beat the curse. HD-2D, single-file, playable in your browser.">
<meta name="theme-color" content="#ff46c8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Endless Saga">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<!-- Open Graph / social preview -->
<meta property="og:type" content="website">
<meta property="og:title" content="Endless Saga — Battle Square">
<meta property="og:description" content="An FF7 Gold Saucer–style roguelike arena. Spin the handicap reels, choose your gamble, and see how far you can go.">
<meta property="og:image" content="preview.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#d8b878; --gold-dim:#a08850; --ink:rgba(9,11,18,.82);
    --hp:#7ce07a; --mp:#7aa8f0;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#05060a;
       width:100%;height:100%;height:100dvh;
       overflow:hidden;overscroll-behavior:none;
       position:fixed;inset:0;
       touch-action:manipulation;-webkit-text-size-adjust:100%;}
  body{display:flex;align-items:center;justify-content:center;
       font-family:'Cormorant Garamond',Georgia,serif;color:#e8e2d4;}
  #game{position:relative;aspect-ratio:16/9;
        width:min(100vw,calc(100vh*16/9));
        width:min(100dvw,calc(100dvh*16/9));
        max-height:100dvh;
        box-shadow:0 0 80px rgba(0,0,0,.9);}
  #cv{position:absolute;inset:0;width:100%;height:100%;}

  /* ---------- HD2D panels ---------- */
  .panel{background:var(--ink);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
         border:1px solid rgba(216,184,120,.5);position:relative;
         box-shadow:0 6px 24px rgba(0,0,0,.55), inset 0 0 30px rgba(0,0,0,.35);}
  .panel::before,.panel::after{content:"";position:absolute;width:7px;height:7px;
         background:var(--gold);transform:rotate(45deg);}
  .panel::before{top:-4px;left:-4px;} .panel::after{bottom:-4px;right:-4px;}

  #cmdwin{position:absolute;left:2.2%;bottom:2.6%;width:24%;min-height:19%;max-height:40%;overflow:hidden;padding:1.1% 1.3%;}
  #statwin{position:absolute;right:2.2%;bottom:2.6%;width:27.5%;padding:1% 1.5%;}
  #msg{position:absolute;top:3.5%;left:50%;transform:translateX(-50%);max-width:70%;
       padding:.7% 2.4%;text-align:center;font-size:clamp(13px,2.5vmin,22px);
       letter-spacing:.06em;white-space:nowrap;}
  #msg.hidden{display:none;}

  .cmd{display:block;width:100%;text-align:left;background:none;border:none;color:#cfc8b8;
       font-family:'Marcellus',serif;font-size:clamp(12px,2.2vmin,19px);letter-spacing:.1em;
       padding:2.2% 2% 2.2% 9%;cursor:pointer;position:relative;line-height:1.25;transition:color .12s;}
  .cmd .cost{float:right;color:#8fa8d8;font-size:.85em;letter-spacing:.05em;}
  .cmd .cnt{float:right;color:#b8a888;font-size:.85em;}
  .cmd.sel{color:var(--gold);}
  .cmd.sel::before{content:"";position:absolute;left:2%;top:50%;width:8px;height:8px;
       background:var(--gold);transform:translateY(-50%) rotate(45deg);
       box-shadow:0 0 8px rgba(216,184,120,.9);animation:pulse 1.1s ease-in-out infinite;}
  .cmd.dis{color:#565a66;}
  @keyframes pulse{50%{opacity:.45;}}

  .srow{display:flex;justify-content:space-between;align-items:baseline;margin:1.2% 0;}
  #pname{font-family:'Marcellus',serif;font-size:clamp(14px,2.6vmin,23px);color:var(--gold);letter-spacing:.22em;}
  .lbl{font-family:'Marcellus',serif;font-size:clamp(10px,1.7vmin,14px);color:#9a927e;letter-spacing:.18em;width:14%;}
  .tiny{font-size:clamp(11px,1.8vmin,15px);color:#a89f8c;letter-spacing:.05em;}
  .bar{height:9px;flex:1;background:rgba(0,0,0,.65);border:1px solid rgba(216,184,120,.35);
       border-radius:1px;overflow:hidden;margin:0 2.5%;}
  .bar i{display:block;height:100%;transition:width .3s;}
  #hpbar i{background:linear-gradient(180deg,#c8f8b8,var(--hp) 40%,#2c7a34);box-shadow:0 0 8px rgba(124,224,122,.6);}
  #mpbar i{background:linear-gradient(180deg,#cfe0ff,var(--mp) 40%,#2a4a9a);box-shadow:0 0 8px rgba(122,168,240,.6);}
  #lbbar i{background:linear-gradient(180deg,#ffe6a0,#ffb020 45%,#c86810);box-shadow:0 0 8px rgba(255,180,40,.7);}
  #lbbar.full{animation:lbpulse .8s ease-in-out infinite;}
  #lbbar.full i{background:linear-gradient(90deg,#fff2b0,#ffd23a,#ff8ad0,#ffd23a);background-size:250% 100%;animation:lbshift 1.2s linear infinite;}
  @keyframes lbshift{to{background-position:250% 0;}}
  @keyframes lbpulse{50%{box-shadow:0 0 14px rgba(255,210,60,.9);}}
  .val{font-size:clamp(11px,1.9vmin,16px);color:#d8d2c2;min-width:20%;text-align:right;font-variant-numeric:tabular-nums;}

  /* ---------- overlays ---------- */
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;
           background:radial-gradient(ellipse at 50% 45%,rgba(8,10,18,.35),rgba(3,4,8,.88) 85%);}
  #overlay.hidden{display:none;}
  .sheet{width:78%;padding:2.5% 3%;text-align:center;overflow:hidden;
       transform-origin:center center;will-change:transform;}
  .title-big{font-family:'Marcellus',serif;font-size:clamp(26px,7.5vmin,64px);letter-spacing:.3em;
       background:linear-gradient(180deg,#f6e6bc,#d8b878 55%,#8a6a34);
       -webkit-background-clip:text;background-clip:text;color:transparent;
       filter:drop-shadow(0 3px 10px rgba(216,184,120,.35));margin:1% 0;}
  .rule{width:44%;height:1px;margin:1.5% auto;border:0;
        background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .subtitle{font-size:clamp(13px,2.3vmin,20px);color:#b8b0a0;letter-spacing:.14em;line-height:1.8;}
  .mbtn{display:block;margin:2% auto;padding:1.4% 3%;min-width:44%;background:rgba(14,16,26,.7);
        border:1px solid rgba(216,184,120,.5);color:#d8d2c2;font-family:'Marcellus',serif;
        font-size:clamp(14px,2.6vmin,22px);letter-spacing:.2em;cursor:pointer;transition:all .15s;}
  .mbtn:hover,.mbtn:focus-visible{color:var(--gold);border-color:var(--gold);
        box-shadow:0 0 18px rgba(216,184,120,.25), inset 0 0 14px rgba(216,184,120,.08);outline:none;}
  .cards{display:flex;gap:2.2%;justify-content:center;margin-top:2.5%;align-items:stretch;}
  .card{flex:1;max-width:31%;padding:2.4% 1.8% 2.8%;cursor:pointer;color:#cfc8b8;
        background:linear-gradient(180deg,rgba(20,23,36,.85),rgba(9,11,18,.9));
        border:1px solid rgba(216,184,120,.4);font-family:inherit;
        font-size:clamp(12px,2vmin,17px);line-height:1.55;letter-spacing:.04em;
        transition:transform .16s,box-shadow .16s,border-color .16s;position:relative;}
  .card:hover,.card:focus-visible{transform:translateY(-5px);border-color:var(--gold);outline:none;
        box-shadow:0 12px 30px rgba(0,0,0,.6),0 0 22px rgba(216,184,120,.22);}
  .card .cicon{font-size:clamp(24px,5.5vmin,44px);display:block;margin-bottom:5%;
        filter:drop-shadow(0 2px 8px rgba(216,184,120,.4));}
  .card .cname{font-family:'Marcellus',serif;color:var(--gold);display:block;margin-bottom:5%;
        font-size:clamp(13px,2.3vmin,20px);letter-spacing:.12em;}
  table{margin:1.5% auto;border-collapse:collapse;font-size:clamp(12px,2.2vmin,19px);width:88%;}
  td,th{padding:.6% 1.4%;border-bottom:1px solid rgba(216,184,120,.18);text-align:left;letter-spacing:.06em;}
  th{font-family:'Marcellus',serif;color:var(--gold);font-weight:normal;letter-spacing:.16em;}
  td.r,th.r{text-align:right;font-variant-numeric:tabular-nums;}
  .sumrow{display:flex;justify-content:space-between;font-size:clamp(13px,2.5vmin,21px);
        margin:.9% 12%;letter-spacing:.08em;}
  .sumrow b{color:var(--gold);font-weight:normal;font-family:'Marcellus',serif;}
  #mute{position:absolute;top:2.5%;right:1.6%;z-index:20;background:rgba(9,11,18,.6);
        border:1px solid rgba(216,184,120,.35);color:#b8b0a0;font-family:'Marcellus',serif;
        font-size:clamp(10px,1.8vmin,14px);letter-spacing:.1em;padding:.4% 1%;cursor:pointer;}
  #pausebtn{position:absolute;top:2.5%;left:1.6%;z-index:20;background:rgba(9,11,18,.6);
        border:1px solid rgba(216,184,120,.35);color:#b8b0a0;font-family:'Marcellus',serif;
        font-size:clamp(13px,2.4vmin,18px);line-height:1;padding:.3% 1.1% .5%;cursor:pointer;}
  #pausebtn.hidden{display:none;}
  #modal{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;
        background:radial-gradient(ellipse at 50% 45%,rgba(8,10,18,.5),rgba(3,4,8,.9) 85%);}
  #modal.hidden{display:none;}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:6%;
        margin:1.9% 8%;font-size:clamp(12px,2.1vmin,17px);letter-spacing:.06em;color:#cfc8b8;}
  .setrow input[type=range]{flex:1;accent-color:#ff46c8;height:4px;}
  .setrow .tog{min-width:64px;padding:.4% 3%;border:1px solid rgba(216,184,120,.5);border-radius:5px;
        background:rgba(14,16,26,.7);color:#cfc8b8;font-family:'Marcellus',serif;font-size:.9em;
        letter-spacing:.1em;cursor:pointer;}
  .setrow .tog.on{color:#0a0410;background:linear-gradient(180deg,#7ce07a,#3fae57);border-color:#7ce07a;}
  .rules{text-align:left;margin:2% 7%;font-size:clamp(11px,1.9vmin,15px);line-height:1.75;color:#c4bcac;letter-spacing:.03em;}
  .rules b{color:var(--gold);font-weight:normal;}
  #bosscard{position:absolute;inset:0;z-index:25;display:none;align-items:center;justify-content:center;
        background:rgba(3,4,8,.55);}
  #bosscard.show{display:flex;animation:bcfade .3s ease-out;}
  @keyframes bcfade{from{opacity:0;}to{opacity:1;}}
  .bc-inner{display:flex;align-items:center;gap:5%;width:76%;padding:2.5% 4%;
        background:linear-gradient(90deg,rgba(40,6,26,.94),rgba(10,4,18,.9));
        border-top:2px solid #ff46c8;border-bottom:2px solid #ff46c8;
        box-shadow:0 0 40px rgba(255,70,200,.4);}
  .bc-inner img{width:34%;max-height:220px;object-fit:contain;filter:drop-shadow(0 6px 20px rgba(0,0,0,.6));
        animation:bcfloat 2.4s ease-in-out infinite;}
  @keyframes bcfloat{50%{transform:translateY(-8px);}}
  .bc-txt{flex:1;text-align:left;}
  .bc-txt .bc-role{font-family:'Marcellus',serif;letter-spacing:.3em;color:#ff8ad0;font-size:clamp(10px,1.9vmin,15px);}
  .bc-txt .bc-name{font-family:'Marcellus',serif;font-size:clamp(20px,5vmin,42px);letter-spacing:.08em;
        background:linear-gradient(180deg,#ffe6a0,#ff46c8);-webkit-background-clip:text;background-clip:text;color:transparent;
        margin:1% 0;}
  .bc-txt .bc-flair{color:#b8b0a0;font-size:clamp(11px,2vmin,16px);letter-spacing:.05em;}
  #rotate{position:fixed;inset:0;z-index:99;display:none;align-items:center;justify-content:center;
        background:#05060a;text-align:center;font-family:'Marcellus',serif;color:var(--gold);
        padding:8%;}
  @media (orientation:portrait){ #rotate{display:flex;} }
  .rot-inner{display:flex;flex-direction:column;align-items:center;gap:22px;}
  .rot-phone{width:clamp(96px,34vw,150px);height:auto;color:var(--gold);
        filter:drop-shadow(0 0 16px rgba(216,184,120,.35));}
  .rot-body{transform-origin:60px 62px;animation:rotPhone 2.6s ease-in-out infinite;}
  @keyframes rotPhone{
    0%,18%   {transform:rotate(0deg);}
    45%,72%  {transform:rotate(-90deg);}
    92%,100% {transform:rotate(0deg);}
  }
  .rot-arc{animation:rotArc 2.6s ease-in-out infinite;}
  @keyframes rotArc{0%,18%{opacity:.25;} 34%{opacity:1;} 60%,100%{opacity:.25;}}
  .rot-txt{font-size:clamp(14px,4.4vw,20px);letter-spacing:.22em;}
  @media (prefers-reduced-motion:reduce){
    .rot-body{animation:none;transform:rotate(-90deg);} .rot-arc{animation:none;opacity:.6;}
  }

  /* ---------- Battle Square casino ---------- */
  #ribbon{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:8;
        padding:.5% 3% .7%;font-family:'Marcellus',serif;letter-spacing:.28em;
        font-size:clamp(11px,2vmin,17px);color:#ffe9a0;
        background:linear-gradient(180deg,rgba(40,8,52,.92),rgba(12,4,20,.92));
        border:1px solid #ff46c8;border-top:none;
        border-radius:0 0 8px 8px;box-shadow:0 0 18px rgba(255,70,200,.5),inset 0 -8px 16px rgba(255,70,200,.15);}
  #ribbon.hidden{display:none;}
  #bossbar{position:absolute;top:8%;left:50%;transform:translateX(-50%);width:56%;z-index:7;text-align:center;}
  #bossbar.hidden{display:none;}
  .bb-name{font-family:'Marcellus',serif;letter-spacing:.18em;font-size:clamp(11px,2.1vmin,17px);
        color:#ff8ad0;text-shadow:0 0 10px rgba(255,70,200,.6);margin-bottom:4px;}
  .bb-track{height:11px;background:rgba(0,0,0,.7);border:1px solid #ff46c8;border-radius:2px;overflow:hidden;
        box-shadow:0 0 16px rgba(255,70,200,.5);}
  .bb-track i{display:block;height:100%;width:100%;transition:width .3s;
        background:linear-gradient(180deg,#ff9ad8,#ff46c8 45%,#8a1a6a);}
  #ribbon b{color:#5cf0ff;font-weight:normal;}
  #bp{color:#ffe25a !important;text-shadow:0 0 8px rgba(255,210,60,.6);letter-spacing:.08em;}
  #callout{position:absolute;top:26%;left:50%;transform:translate(-50%,-50%) scale(.4);z-index:9;
        font-family:'Marcellus',serif;font-size:clamp(30px,8vmin,72px);letter-spacing:.1em;
        color:#fff;opacity:0;pointer-events:none;white-space:nowrap;
        text-shadow:0 0 18px currentColor,0 3px 0 rgba(0,0,0,.5);}
  #callout.pop{animation:calloutPop .9s ease-out;}
  @keyframes calloutPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-6deg);}
    18%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(2deg);}
    32%{transform:translate(-50%,-50%) scale(1) rotate(0);}
    75%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,-58%) scale(1);}
  }
  /* slot machine */
  .slot-title{font-family:'Marcellus',serif;letter-spacing:.24em;
        font-size:clamp(18px,4.4vmin,36px);
        background:linear-gradient(180deg,#ffd6f4,#ff46c8 50%,#7a1a8a);
        -webkit-background-clip:text;background-clip:text;color:transparent;
        filter:drop-shadow(0 0 14px rgba(255,70,200,.5));margin:0 0 1%;}
  .reels{display:flex;gap:2%;justify-content:center;margin:2% auto 1%;width:70%;
        padding:2.4% 2%;border-radius:12px;position:relative;
        background:linear-gradient(180deg,#2a0838,#120418);
        border:2px solid #ff46c8;box-shadow:0 0 26px rgba(255,70,200,.45),inset 0 0 26px rgba(0,0,0,.6);}
  .reels::before,.reels::after{content:"";position:absolute;top:8%;bottom:8%;width:6px;border-radius:3px;
        background:repeating-linear-gradient(180deg,#ffe25a 0 8px,#ff46c8 8px 16px);opacity:.8;}
  .reels::before{left:1.5%;} .reels::after{right:1.5%;}
  .reel{flex:1;height:clamp(64px,15vmin,120px);overflow:hidden;border-radius:8px;
        background:radial-gradient(ellipse at 50% 40%,#1a0824,#05020a);
        border:2px solid #5cf0ff;box-shadow:inset 0 0 20px rgba(0,0,0,.8),0 0 12px rgba(92,240,255,.35);
        display:flex;align-items:center;justify-content:center;position:relative;}
  .reel::after{content:"";position:absolute;inset:0;pointer-events:none;
        background:linear-gradient(180deg,rgba(255,255,255,.14),transparent 30%,transparent 70%,rgba(0,0,0,.5));}
  .reel .strip{display:flex;flex-direction:column;align-items:center;
        font-size:clamp(30px,7vmin,60px);line-height:1.35;will-change:transform;}
  .wagers{display:flex;gap:2.2%;justify-content:center;margin-top:2%;align-items:stretch;}
  .wager{flex:1;max-width:31%;cursor:pointer;font-family:inherit;color:#e8e2d4;
        border-radius:10px;overflow:hidden;text-align:left;position:relative;
        background:linear-gradient(180deg,rgba(24,10,34,.94),rgba(8,3,14,.96));
        border:2px solid rgba(255,70,200,.4);transition:transform .16s,box-shadow .16s,border-color .16s;
        opacity:0;transform:translateY(16px);}
  .wager.in{opacity:1;transform:translateY(0);}
  .wager:hover,.wager:focus-visible{transform:translateY(-6px);border-color:#5cf0ff;outline:none;
        box-shadow:0 12px 30px rgba(0,0,0,.6),0 0 26px rgba(92,240,255,.35);}
  .wager .whead{padding:3% 6% 2.4%;font-family:'Marcellus',serif;letter-spacing:.16em;
        font-size:clamp(11px,2vmin,16px);text-align:center;color:#0a0410;}
  .wager.safe .whead{background:linear-gradient(180deg,#7ce07a,#3fae57);}
  .wager.gamble .whead{background:linear-gradient(180deg,#ffd85a,#e0a020);}
  .wager.wild .whead{background:linear-gradient(180deg,#ff8adc,#ff46c8);color:#fff;}
  .wager.jackpot .whead{background:linear-gradient(90deg,#ffe25a,#ff46c8,#5cf0ff,#ffe25a);
        background-size:300% 100%;animation:jp 2s linear infinite;color:#1a0410;}
  @keyframes jp{to{background-position:300% 0;}}
  .wager .wbody{padding:4% 7% 5%;}
  .wcost{display:flex;align-items:center;gap:6px;font-size:clamp(11px,1.9vmin,16px);margin-bottom:5%;
        color:#ff8a8a;line-height:1.4;}
  .wgain{display:flex;align-items:center;gap:6px;font-size:clamp(11px,1.9vmin,16px);
        color:#8cf0a0;line-height:1.4;}
  .wico{font-size:clamp(20px,4.4vmin,34px);flex:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));}
  .wsep{height:1px;margin:5% 0;background:linear-gradient(90deg,transparent,rgba(216,184,120,.4),transparent);}
  .wager .wname{font-family:'Marcellus',serif;color:#fff;letter-spacing:.04em;}
  #hcbadge{position:absolute;top:2.5%;left:1.6%;z-index:8;font-family:'Marcellus',serif;
        font-size:clamp(10px,1.8vmin,15px);letter-spacing:.1em;color:#ffb0b0;
        padding:.4% 1.2%;border-radius:6px;
        background:rgba(40,6,20,.85);border:1px solid #ff5a7a;box-shadow:0 0 12px rgba(255,90,120,.4);}
  #hcbadge.hidden{display:none;}
  /* ---- icon system: inline SVGs scale with their container ---- */
  .card .cicon svg{width:clamp(26px,5.5vmin,44px);height:clamp(26px,5.5vmin,44px);}
  .card .cicon{color:var(--gold);}
  .reel .strip svg{width:clamp(30px,7vmin,58px);height:clamp(30px,7vmin,58px);
        filter:drop-shadow(0 0 10px rgba(92,240,255,.55));color:#e8e2d4;}
  .wico svg{width:clamp(20px,4.4vmin,34px);height:clamp(20px,4.4vmin,34px);}
  .wcost .wico{color:#ff9aa8;} .wgain .wico{color:#8cf0a0;}
  #hcbadge svg{color:#ffb0b0;vertical-align:-.18em;}
  #gear svg{opacity:.9;vertical-align:-.12em;}
  .cmd svg{vertical-align:-.15em;}
  .setrow svg{vertical-align:-.18em;}
  #pausebtn svg{display:block;color:#b8b0a0;}
  .slot-title svg{vertical-align:-.12em;color:var(--gold);}
  .rules svg,.sumrow svg{vertical-align:-.15em;}
  /* ---- character portraits ---- */
  .portrait{display:block;margin:0 auto 1.5%;width:clamp(72px,15vmin,120px);height:auto;
        filter:drop-shadow(0 6px 18px rgba(0,0,0,.65));}
  .portrait.win{animation:portGlow 2.2s ease-in-out infinite;}
  @keyframes portGlow{50%{filter:drop-shadow(0 6px 22px rgba(255,210,60,.55));}}
  .portrait.dead{filter:drop-shadow(0 6px 18px rgba(0,0,0,.7)) grayscale(.7) brightness(.72);}
  .card .portrait{width:clamp(56px,11vmin,88px);margin-bottom:4%;}
  .pname-lbl{font-family:'Marcellus',serif;letter-spacing:.2em;color:var(--gold);
        font-size:clamp(11px,2vmin,16px);margin-bottom:1.5%;}
  @media (prefers-reduced-motion:reduce){ .cmd.sel::before{animation:none} .card:hover{transform:none}
        #callout.pop{animation:none;opacity:1;} .wager{transition:none;} }
</style>
</head>
<body>
<div id="game">
  <canvas id="cv" width="960" height="540"></canvas>

// canvas vector glyphs for status icons drawn above combatants
function drawGlyph(g,name,x,y,r,color){
  g.save();g.translate(x,y);g.lineWidth=2;g.strokeStyle=color;g.fillStyle=color;
  g.lineCap='round';g.lineJoin='round';
  if(name==='fire'){g.beginPath();g.moveTo(0,-r);g.quadraticCurveTo(r*.8,-r*.2,r*.5,r*.4);g.quadraticCurveTo(r*.3,r,0,r);g.quadraticCurveTo(-r*.5,r,-r*.5,r*.3);g.quadraticCurveTo(-r*.5,-r*.2,0,-r);g.fill();}
  else if(name==='poison'){g.beginPath();g.arc(0,r*.2,r*.7,0,Math.PI*2);g.fill();g.beginPath();g.moveTo(-r*.4,-r*.2);g.lineTo(-r*.7,-r);g.moveTo(r*.4,-r*.2);g.lineTo(r*.7,-r);g.stroke();}
  else if(name==='freeze'){for(let i=0;i<3;i++){g.rotate(Math.PI/3);g.beginPath();g.moveTo(0,-r);g.lineTo(0,r);g.stroke();}}
  else if(name==='stun'){g.beginPath();for(let a=0;a<Math.PI*3.2;a+=.3){const rr=r*a/(Math.PI*3.2);g.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}g.stroke();}
  else if(name==='protect'||name==='shield'){g.beginPath();g.moveTo(0,-r);g.lineTo(r*.8,-r*.5);g.lineTo(r*.8,r*.3);g.quadraticCurveTo(0,r*1.1,0,r);g.quadraticCurveTo(0,r*1.1,-r*.8,r*.3);g.lineTo(-r*.8,-r*.5);g.closePath();g.fill();}
  else if(name==='focus'){g.beginPath();g.moveTo(-r*.6,r);g.lineTo(r*.5,-r*.7);g.lineTo(r,-r);g.lineTo(r*.7,-r*.5);g.lineTo(-r*.4,r*.6);g.closePath();g.fill();}
  else if(name==='defdown'){g.beginPath();g.moveTo(0,r);g.lineTo(-r*.7,-r*.2);g.lineTo(-r*.3,-r*.2);g.lineTo(-r*.3,-r);g.lineTo(r*.3,-r);g.lineTo(r*.3,-r*.2);g.lineTo(r*.7,-r*.2);g.closePath();g.fill();}
  else if(name==='regen'){g.beginPath();g.moveTo(r,-r);g.quadraticCurveTo(-r,-r,-r,r);g.quadraticCurveTo(r*.2,r*.2,r,-r);g.fill();}
  else if(name==='haste'){g.beginPath();g.moveTo(-r,-r*.7);g.lineTo(0,0);g.lineTo(-r,r*.7);g.moveTo(0,-r*.7);g.lineTo(r,0);g.lineTo(0,r*.7);g.stroke();}
  else if(name==='silence'){g.beginPath();g.moveTo(-r,-r*.4);g.lineTo(-r*.3,-r*.4);g.lineTo(r*.2,-r);g.lineTo(r*.2,r);g.lineTo(-r*.3,r*.4);g.lineTo(-r,r*.4);g.closePath();g.fill();g.beginPath();g.moveTo(r*.5,-r*.5);g.lineTo(r,r*.5);g.stroke();}
  else if(name==='doom'){g.beginPath();g.arc(0,-r*.1,r*.7,Math.PI,0);g.lineTo(r*.5,r*.5);g.lineTo(-r*.5,r*.5);g.closePath();g.fill();g.fillStyle='#0a0410';g.beginPath();g.arc(-r*.25,-r*.1,r*.18,0,7);g.arc(r*.25,-r*.1,r*.18,0,7);g.fill();}
  else{g.beginPath();g.arc(0,0,r*.7,0,Math.PI*2);g.fill();}
  g.restore();
}

let sfxBus=null;
function sfxBusNode(){const c=ac();if(c&&!sfxBus){sfxBus=c.createGain();sfxBus.gain.value=CFG.sfx;sfxBus.connect(c.destination);}return sfxBus;}
function applyVolumes(){if(sfxBus)sfxBus.gain.value=CFG.sfx;if(musicGain)musicGain.gain.value=CFG.music*.9;}
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==='suspended')AC.resume();return AC;}
function tone(f0,f1,dur,type='square',vol=0.16,when=0){
  const c=ac();if(!c||muted)return;
  const t=c.currentTime+when,o=c.createOscillator(),g=c.createGain();
  o.type=type;o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  const bus=sfxBusNode()||c.destination;o.connect(g).connect(bus);o.start(t);o.stop(t+dur+.02);
}
function noise(dur,vol=0.2,when=0,hp=400){
  const c=ac();if(!c||muted)return;
  const t=c.currentTime+when,n=c.createBufferSource(),b=c.createBuffer(1,c.sampleRate*dur,c.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=b;const f=c.createBiquadFilter();f.type='highpass';f.frequency.value=hp;
  const g=c.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  const bus=sfxBusNode()||c.destination;n.connect(f).connect(g).connect(bus);n.start(t);
}

/* ---- auto-fit: scale any panel down so it always fits — menus never scroll ---- */
let _fitting=false;
function fitSheet(el){
  if(!el||!el.parentElement)return;
  el.style.transform='none';
  const box=el.parentElement.getBoundingClientRect();
  if(!box.height||!box.width)return;
  const nh=el.scrollHeight, nw=el.scrollWidth;   // natural, unscaled size
  if(!nh||!nw)return;
  const s=Math.min(1,(box.height*0.95)/nh,(box.width*0.97)/nw);
  el.style.transform=s<0.999?'scale('+s.toFixed(4)+')':'none';
}
function fitAllSheets(){
  if(_fitting)return;
  _fitting=true;                       // our own style writes must not retrigger the observer
  fitSheet($('#sheet'));fitSheet($('#modalsheet'));
  requestAnimationFrame(()=>{_fitting=false;});
}
(function(){
  const mo=new MutationObserver(()=>{if(!_fitting)requestAnimationFrame(fitAllSheets);});
  const sh=$('#sheet'),ms=$('#modalsheet');
  // content changes only — NOT attributes, or our own transform would loop
  const opt={childList:true,subtree:true,characterData:true};
  if(sh)mo.observe(sh,opt);
  if(ms)mo.observe(ms,opt);
  // panel show/hide is signalled by a class flip on the container
  const ov=$('#overlay'),md=$('#modal');
  if(ov)mo.observe(ov,{attributes:true,attributeFilter:['class']});
  if(md)mo.observe(md,{attributes:true,attributeFilter:['class']});
  addEventListener('resize',fitAllSheets);
  addEventListener('orientationchange',()=>setTimeout(fitAllSheets,150));
  if(document.fonts&&document.fonts.ready)document.fonts.ready.then(fitAllSheets);
})();

let musicGain=null, musicTheme=null, musicPlaying=false, musStep=0, musNext=0, musTimer=null;
const NOTE={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,Bb3:233.08,B3:246.94,
  C4:261.63,D4:293.66,Eb4:311.13,E4:329.63,F4:349.23,G4:392,A4:440,Bb4:466.16,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880,_:0};
const THEMES_MUS={
  title:{bpm:84,step:.5,
    bass:['A2','A2','F2','F2','C3','C3','E3','E3'].map(n=>n),
    arp:['A3','C4','E4','C4','F3','A3','C4','A3','C3','E3','G3','E3','E3','G3','B3','G3'],
    lead:['_','_','E4','_','_','_','C4','_','_','_','A3','_','_','_','B3','_']},
  battle:{bpm:132,step:.25,
    bass:['A2','A2','E3','A2','F2','F2','C3','F2','G2','G2','D3','G2','E3','E3','B2','E3'],
    arp:['A3','E4','A4','E4','A3','E4','A4','E4','F3','C4','F4','C4','G3','D4','G4','D4'],
    lead:['A4','_','C5','_','E5','_','C5','A4','F4','_','A4','_','G4','_','B4','D5']},
  boss:{bpm:120,step:.25,
    bass:['D2','D2','D2','A2','Bb2','Bb2','Bb2','F2','C3','C3','C3','G2','A2','A2','E2','A2'],
    arp:['D3','A3','D4','F4','D3','A3','D4','F4','Bb3','D4','F4','Bb4','A3','C4','E4','A4'],
    lead:['_','_','D5','_','F5','_','_','E5','_','D5','_','C5','_','_','A4','_']}
};
function noteHz(n){if(!n||n==='_')return 0;const m=n.match(/([A-G]b?)(\d)/);if(!m)return NOTE[n]||0;
  const base={C:16.35,D:18.35,E:20.6,F:21.83,G:24.5,A:27.5,Bb:29.14,B:30.87}[m[1]];return base*Math.pow(2,+m[2]);}
function musVoice(freq,dur,type,vol,t,glideTo){
  const c=ac();if(!c||!musicGain||!freq)return;
  const o=c.createOscillator(),g=c.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  if(glideTo)o.frequency.exponentialRampToValueAtTime(glideTo,t+dur);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.015);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g).connect(musicGain);o.start(t);o.stop(t+dur+.02);
}
function musScheduleStep(s,t){
  const M=THEMES_MUS[musicTheme];if(!M)return;
  const sd=60/M.bpm*(M.step/.25)*.25; // seconds per step
  // bass (every step, half-length legato)
  const b=M.bass[s%M.bass.length];if(b&&b!=='_')musVoice(noteHz(b),sd*1.6,'triangle',.16,t);
  // arp (busy)
  const a=M.arp[s%M.arp.length];if(a&&a!=='_')musVoice(noteHz(a),sd*.9,'square',.045,t);
  // lead (sparser, softer)
  const l=M.lead[s%M.lead.length];if(l&&l!=='_')musVoice(noteHz(l),sd*1.4,'sawtooth',.05,t);
  // soft kick on strong beats for battle/boss
  if(musicTheme!=='title'&&s%4===0){const c=ac();if(c){const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(45,t+.12);
    g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);
    o.connect(g).connect(musicGain);o.start(t);o.stop(t+.16);}}
}
function musLoop(){
  const c=ac();if(!c||!musicPlaying)return;
  const M=THEMES_MUS[musicTheme];const sd=60/M.bpm*(M.step/.25)*.25;
  while(musNext < c.currentTime+.25){musScheduleStep(musStep,musNext);musNext+=sd;musStep=(musStep+1)%16;}
  musTimer=setTimeout(musLoop,40);
}
function startMusic(theme){
  if(muted)return;const c=ac();if(!c)return;
  if(!musicGain){musicGain=c.createGain();musicGain.gain.value=CFG.music*.9;musicGain.connect(c.destination);}
  if(musicTheme===theme&&musicPlaying)return;
  musicTheme=theme;
  if(!musicPlaying){musicPlaying=true;musStep=0;musNext=c.currentTime+.08;musLoop();}
}
function stopMusic(){musicPlaying=false;if(musTimer)clearTimeout(musTimer);musTimer=null;}


/* ============================ CHARACTER ART (procedural, painterly) ============================ */
/* Each creature is drawn with gradients, form-shading and rim light onto a super-sampled
   offscreen buffer, cached, then composited with a soft ink outline. Light is top-left. */
function _lg(g,x0,y0,x1,y1,st){const q=g.createLinearGradient(x0,y0,x1,y1);st.forEach(s=>q.addColorStop(s[0],s[1]));return q;}
function _rg(g,x,y,r0,r,st){const q=g.createRadialGradient(x,y,r0,x,y,r);st.forEach(s=>q.addColorStop(s[0],s[1]));return q;}
function _ell(g,x,y,rx,ry,rot){g.beginPath();g.ellipse(x,y,rx,ry,rot||0,0,7);g.fill();}
function _orb(g,x,y,r,lo,hi){g.fillStyle=_rg(g,x-r*.35,y-r*.35,0,r*1.35,[[0,hi],[.6,lo],[1,lo]]);_ell(g,x,y,r,r);}
function _poly(g,pts){g.beginPath();g.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);g.closePath();g.fill();}
function _shade(hex,f){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  if(f>0){r+=(255-r)*f;g+=(255-g)*f;b+=(255-b)*f;}else{r*=1+f;g*=1+f;b*=1+f;}
  return'#'+((1<<24)+(Math.round(r)<<16)+(Math.round(g)<<8)+Math.round(b)).toString(16).slice(1);}

/* ---- individual creature painters (native coords, feet at h, centre at w/2) ---- */
function paintHero(g,w,h,C){
  /* Side-on classic JRPG hero — facing LEFT toward the arena (enemies).
     Built in profile: back leg braced behind, front leg forward, torso
     angled, head in true profile with spiked hair, blade held ready. */
  const cx=w*.60, gy=h-4;
  const F=-1;                       // forward direction (left)
  const X=d=>cx+d*F;                // helper: +d = forward/toward foe
  const hairLo=C.plume, hairHi=C.plumeHi;

  /* ---------- cape, streaming BACK (away from the foe) ---------- */
  g.fillStyle=_lg(g,X(-6),h*.34,X(-34),gy,[[0,_shade(C.cape,.15)],[1,_shade(C.cape,-.5)]]);
  _poly(g,[[X(-2),h*.36],[X(-14),h*.38],[X(-30),h*.58],[X(-26),h*.8],[X(-34),gy-6],
           [X(-16),gy-10],[X(-8),h*.72],[X(-4),h*.5]]);
  g.fillStyle='rgba(0,0,0,.22)';   // inner fold
  _poly(g,[[X(-4),h*.4],[X(-12),h*.44],[X(-18),h*.7],[X(-10),h*.72]]);

  /* ---------- BACK leg (braced behind, further from viewer) ---------- */
  g.fillStyle=_lg(g,X(-14),h*.66,X(-14),gy,[[0,_shade(C.cloth,-.15)],[1,_shade(C.cloth,-.55)]]);
  _poly(g,[[X(-4),h*.66],[X(-14),h*.67],[X(-21),h*.86],[X(-17),gy-3],[X(-8),gy-3],[X(-6),h*.84]]);
  g.fillStyle=_shade(C.trim,-.35);  // back boot
  _poly(g,[[X(-19),gy-9],[X(-6),gy-9],[X(-3),gy],[X(-23),gy]]);

  /* ---------- FRONT leg (striding toward the foe) ---------- */
  g.fillStyle=_lg(g,X(10),h*.66,X(10),gy,[[0,C.clothHi],[1,_shade(C.cloth,-.35)]]);
  _poly(g,[[X(-2),h*.66],[X(9),h*.66],[X(14),h*.85],[X(12),gy-3],[X(2),gy-3],[X(0),h*.84]]);
  g.fillStyle=C.trim;               // front boot
  _poly(g,[[X(0),gy-10],[X(13),gy-10],[X(18),gy],[X(-3),gy]]);
  g.fillStyle=_shade(C.trim,.3);g.fillRect(X(13)-(F<0?5:0),gy-10,5,3); // toe cap glint

  /* ---------- FAR arm (behind the torso, trailing back) ---------- */
  g.fillStyle=_lg(g,X(-8),h*.46,X(-16),h*.64,[[0,_shade(C.plate,-.2)],[1,_shade(C.plate,-.55)]]);
  _poly(g,[[X(-4),h*.46],[X(-13),h*.5],[X(-17),h*.64],[X(-9),h*.66],[X(-4),h*.56]]);

  /* ---------- TORSO in profile (chest forward, back arched) ---------- */
  g.fillStyle=_lg(g,X(12),h*.42,X(-10),h*.7,[[0,C.plateHi],[.45,C.plate],[1,_shade(C.plate,-.45)]]);
  _poly(g,[[X(10),h*.44],[X(13),h*.54],[X(11),h*.66],[X(2),h*.7],[X(-10),h*.69],
           [X(-13),h*.56],[X(-9),h*.44],[X(0),h*.41]]);
  // chest highlight running down the leading edge
  g.fillStyle='rgba(255,255,255,.20)';
  _poly(g,[[X(9),h*.45],[X(13),h*.55],[X(10),h*.65],[X(5),h*.63],[X(6),h*.5]]);
  // back shadow
  g.fillStyle='rgba(0,0,0,.25)';
  _poly(g,[[X(-9),h*.45],[X(-13),h*.57],[X(-10),h*.68],[X(-5),h*.66],[X(-6),h*.5]]);
  // segmented plate lines
  g.strokeStyle=_shade(C.plate,-.5);g.lineWidth=1.6;
  g.beginPath();
  g.moveTo(X(-10),h*.55);g.lineTo(X(11),h*.545);
  g.moveTo(X(-9),h*.62);g.lineTo(X(11),h*.615);
  g.stroke();

  /* ---------- belt + tasset ---------- */
  g.fillStyle=C.trim;
  _poly(g,[[X(-12),h*.675],[X(12),h*.665],[X(12),h*.705],[X(-12),h*.715]]);
  g.fillStyle=_shade(C.trim,.4);_ell(g,X(1),h*.69,4.5,4);   // buckle
  g.fillStyle=_shade(C.trim,-.4);_ell(g,X(1),h*.69,2,1.8);

  /* ---------- scabbard on the far hip ---------- */
  g.fillStyle=_shade(C.guard,-.35);
  g.save();g.translate(X(-10),h*.72);g.rotate(F*0.42);
  g.fillRect(-3,0,6,30);
  g.fillStyle=_shade(C.trim,-.1);g.fillRect(-3.5,0,7,4);g.fillRect(-3.5,26,7,4);
  g.restore();

  /* ---------- near pauldron (big, over the leading shoulder) ---------- */
  g.fillStyle=_rg(g,X(2),h*.42,1,20,[[0,_shade(C.plateHi,.25)],[.6,C.plate],[1,_shade(C.plate,-.45)]]);
  _poly(g,[[X(-11),h*.44],[X(-4),h*.375],[X(8),h*.375],[X(15),h*.44],[X(13),h*.52],
           [X(0),h*.5],[X(-10),h*.5]]);
  g.fillStyle='rgba(255,255,255,.28)';   // top rim light
  _poly(g,[[X(-3),h*.385],[X(7),h*.385],[X(11),h*.42],[X(-6),h*.42]]);
  g.fillStyle=C.trim;                    // gold rim on the leading edge
  _poly(g,[[X(15),h*.44],[X(13),h*.52],[X(9),h*.51],[X(11),h*.435]]);

  /* ---------- HEAD in profile, facing left ---------- */
  const hy=h*.29;
  // neck
  g.fillStyle=_shade(C.skin,-.3);_poly(g,[[X(-5),h*.36],[X(4),h*.36],[X(3),h*.41],[X(-5),h*.41]]);
  // skull + jaw (profile silhouette: brow, nose, lips, chin)
  g.fillStyle=C.skin;
  g.beginPath();
  g.moveTo(X(-9),hy-9);                              // back of skull
  g.quadraticCurveTo(X(2),hy-14, X(9),hy-5);         // crown to brow
  g.lineTo(X(11),hy-1);                              // brow ridge
  g.lineTo(X(14),hy+2);                              // NOSE tip
  g.lineTo(X(10),hy+4);                              // under nose
  g.lineTo(X(11),hy+6);                              // upper lip
  g.lineTo(X(9),hy+8);                               // mouth
  g.lineTo(X(10),hy+11);                             // chin
  g.quadraticCurveTo(X(4),hy+15, X(-4),hy+12);       // jawline back
  g.quadraticCurveTo(X(-10),hy+6, X(-9),hy-9);
  g.closePath();g.fill();

/* ---- buffer cache with soft ink outline + flash/silhouette variants ---- */
const artCache=new Map();
function creatureImg(art,variantKey,C){
  const key=art+'|'+variantKey;
  if(artCache.has(key))return artCache.get(key);
  const A=ART[art],S=2,bw=A.bw,bh=A.bh;
  const img=document.createElement('canvas');img.width=bw*S;img.height=bh*S;
  const g=img.getContext('2d');g.scale(S,S);g.lineJoin='round';
  A.paint(g,bw,bh,C);
  const mk=fill=>{const c=document.createElement('canvas');c.width=bw*S;c.height=bh*S;
    const x=c.getContext('2d');x.drawImage(img,0,0);x.globalCompositeOperation='source-in';
    x.fillStyle=fill;x.fillRect(0,0,bw*S,bh*S);return c;};
  const out={img,sil:mk('#080a12'),wht:mk('#ffffff'),w:bw,h:bh};
  artCache.set(key,out);return out;
}
function drawEntity(ctx,ci,cx,fy,dh,squash,alpha){
  squash=squash||1;alpha=alpha==null?1:alpha;
  const sc=dh/ci.h, dw=ci.w*sc, dhh=dh*squash;
  const x=cx-dw/2, y=fy-dhh;
  ctx.globalAlpha=alpha*.55;
  const o=Math.max(1.5,sc*1.4);
  for(const[ox,oy]of[[-o,0],[o,0],[0,-o],[0,o],[-o,-o],[o,o],[o,-o],[-o,o]])ctx.drawImage(ci.sil,x+ox,y+oy,dw,dhh);
  ctx.globalAlpha=alpha;
  ctx.drawImage(ci.img,x,y,dw,dhh);
  ctx.globalAlpha=1;
  return{x,y,w:dw,h:dhh,ci};
}
function artAspect(art){const a=ART[art];return a.bw/a.bh;}
// crop the head/bust from the hero art to make a framed portrait
const portraitCache=new Map();
function heroPortrait(charIdx,arm,wpn,size){
  charIdx=charIdx||0;arm=arm||0;wpn=wpn||0;size=size||140;
  const key=charIdx+'-'+arm+'-'+wpn+'-'+size;
  if(portraitCache.has(key))return portraitCache.get(key);
  const ci=creatureImg('hero',arm+'-'+wpn+'-'+charIdx,heroColor(arm,wpn,charIdx));
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const g=c.getContext('2d');
  // backing plate
  const bg=g.createRadialGradient(size/2,size*.38,4,size/2,size*.5,size*.7);
  bg.addColorStop(0,'rgba(60,20,70,.9)');bg.addColorStop(1,'rgba(6,3,12,.95)');
  g.fillStyle=bg;g.fillRect(0,0,size,size);
  // crop the upper ~46% of the source art (head + shoulders), centered
  const sw=ci.img.width, sh=ci.img.height;
  const cropH=sh*0.46, cropW=cropH; // square crop
  const sx=(sw-cropW)/2, sy=sh*0.02;
  g.save();
  g.beginPath();g.arc(size/2,size/2,size*.44,0,Math.PI*2);g.clip();
  g.drawImage(ci.img,sx,sy,cropW,cropH,size*.06,size*.06,size*.88,size*.88);
  g.restore();
  // frame ring
  g.strokeStyle='rgba(216,184,120,.85)';g.lineWidth=Math.max(2,size*.022);
  g.beginPath();g.arc(size/2,size/2,size*.44,0,Math.PI*2);g.stroke();
  g.strokeStyle='rgba(255,70,200,.5)';g.lineWidth=Math.max(1,size*.012);
  g.beginPath();g.arc(size/2,size/2,size*.47,0,Math.PI*2);g.stroke();
  const url=c.toDataURL();
  portraitCache.set(key,url);return url;
}

const arenaLayerCache=[];
function arenaLayers(skin){
  skin=skin||0;
  if(arenaLayerCache[skin])return arenaLayerCache[skin];
  const S=ARENA_SKINS[skin]||ARENA_SKINS[0];
  const HOR=H*.52;
  const far=document.createElement('canvas');far.width=W;far.height=H;const xf=far.getContext('2d');
  const near=document.createElement('canvas');near.width=W;near.height=H;const xn=near.getContext('2d');
  // ---- FAR: wall, crowd, signage, marquee, side vignette ----
  const wg=xf.createLinearGradient(0,0,0,HOR);
  wg.addColorStop(0,S.wall[0]);wg.addColorStop(.6,S.wall[1]);wg.addColorStop(1,S.wall[2]);
  xf.fillStyle=wg;xf.fillRect(0,0,W,HOR+40);
  for(let r=0;r<5;r++){const yy=60+r*22;
    for(let cx=20;cx<W;cx+=18){
      xf.globalAlpha=.10+.06*Math.sin(cx*.3+r);
      xf.fillStyle=r%2?S.cB:S.cA;xf.fillRect(cx+(r%2?9:0),yy,6,10);}}
  xf.globalAlpha=1;
  xf.filter='blur(1px)';
  for(const[col,sx,h,w]of S.signs){
    xf.fillStyle=col;xf.globalAlpha=.9;xf.fillRect(sx,40,w,h);
    xf.globalAlpha=.35;xf.fillRect(sx-6,34,w+12,h+12);
  }
  xf.filter='none';xf.globalAlpha=1;
  for(let bx=16;bx<W;bx+=26){xf.fillStyle=(bx/26|0)%2?'#ffe25a':'#fff';
    xf.beginPath();xf.arc(bx,86,3.4,0,Math.PI*2);xf.fill();}
  const sd=xf.createLinearGradient(0,0,W,0);
  sd.addColorStop(0,'rgba(0,0,0,.5)');sd.addColorStop(.5,'rgba(0,0,0,0)');sd.addColorStop(1,'rgba(0,0,0,.5)');
  xf.fillStyle=sd;xf.fillRect(0,0,W,HOR);
  // ---- NEAR: horizon glow, floor, grid, ring (transparent above floor) ----
  const hg=xn.createLinearGradient(0,HOR-30,0,HOR+10);
  hg.addColorStop(0,'rgba(0,0,0,0)');hg.addColorStop(1,S.horizon);
  xn.fillStyle=hg;xn.fillRect(0,HOR-30,W,40);
  xn.fillStyle=S.hline;xn.fillRect(0,HOR-2,W,3);
  const fg=xn.createLinearGradient(0,HOR,0,H);
  fg.addColorStop(0,S.floor[0]);fg.addColorStop(1,S.floor[1]);
  xn.fillStyle=fg;xn.fillRect(0,HOR,W,H-HOR);
  const vpx=W/2;xn.lineWidth=2;
  for(let i=0;i<=10;i++){const t=i/10,yy=HOR+(H-HOR)*(t*t);
    xn.strokeStyle='rgba('+S.gridH+','+(0.12+0.28*t)+')';
    xn.beginPath();xn.moveTo(0,yy);xn.lineTo(W,yy);xn.stroke();}
  for(let i=-7;i<=7;i++){const fx=vpx+i*90;
    xn.strokeStyle='rgba('+S.gridV+','+(0.10+0.20*(1-Math.abs(i)/8))+')';
    xn.beginPath();xn.moveTo(vpx+i*10,HOR);xn.lineTo(fx,H);xn.stroke();}
  xn.strokeStyle=S.ring1;xn.lineWidth=3;
  xn.save();xn.translate(W/2,H*.70);xn.scale(1,.34);
  xn.beginPath();xn.arc(0,0,300,0,Math.PI*2);xn.stroke();
  xn.strokeStyle=S.ring2;xn.beginPath();xn.arc(0,0,320,0,Math.PI*2);xn.stroke();
  xn.restore();
  arenaLayerCache[skin]={far,near};
  return arenaLayerCache[skin];
}

function buildBG(ti){
  if(bgCache[ti])return bgCache[ti];
  const th=THEMES[ti];
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const x=c.getContext('2d');
  if(th.arena){bgCache[ti]=buildArena(c,x);return bgCache[ti];}
  // sky
  const sg=x.createLinearGradient(0,0,0,H*.72);
  sg.addColorStop(0,th.sky[0]);sg.addColorStop(.62,th.sky[1]);sg.addColorStop(1,th.sky[2]);
  x.fillStyle=sg;x.fillRect(0,0,W,H*.74);
  // celestial body + bloom
  if(th.sun){
    const s=th.sun;
    let g=x.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4.2);
    g.addColorStop(0,th.sun.glow);g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g;x.fillRect(s.x-s.r*4.2,s.y-s.r*4.2,s.r*8.4,s.r*8.4);
    g=x.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r);
    g.addColorStop(0,'#ffffff');g.addColorStop(.55,s.c);g.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g;x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);x.fill();
  }
  // stars for dark skies
  if(ti===2||ti===5){x.fillStyle='rgba(255,255,255,.8)';
    for(let i=0;i<70;i++){const sx=(i*137)%W,sy=(i*89)%(H*.5);x.globalAlpha=rnd(.2,.9);x.fillRect(sx,sy,2,2);}x.globalAlpha=1;}
  // FAR layer — heavy blur (deep depth of field)
  x.filter='blur(7px)';
  x.fillStyle=th.far;
  for(let i=0;i<7;i++){const bx=i*170-60+((ti*53)%80);
    const pk=H*.36+((i*61+ti*29)%70);
    x.beginPath();x.moveTo(bx,H*.74);x.lineTo(bx+95,pk);x.lineTo(bx+200,H*.74);x.closePath();x.fill();}
  // MID layer — soft blur
  x.filter='blur(3px)';
  x.fillStyle=th.mid;
  if(th.crystals){
    for(let i=0;i<10;i++){const bx=(i*113+40)%W;const hh=60+(i*47)%110;
      x.beginPath();x.moveTo(bx-16,H*.76);x.lineTo(bx,H*.76-hh);x.lineTo(bx+16,H*.76);x.closePath();x.fill();
      x.fillStyle='rgba(120,140,255,.28)';
      x.beginPath();x.moveTo(bx-6,H*.76);x.lineTo(bx,H*.76-hh+8);x.lineTo(bx+6,H*.76);x.closePath();x.fill();
      x.fillStyle=th.mid;}
  }else{
    for(let i=0;i<12;i++){const bx=i*95-30;
      x.beginPath();x.moveTo(bx,H*.77);x.lineTo(bx+48,H*.52+((i*73+ti*17)%60));x.lineTo(bx+100,H*.77);x.closePath();x.fill();}
  }
  x.filter='none';
  // atmospheric haze band at horizon
  const hz=x.createLinearGradient(0,H*.56,0,H*.78);
  hz.addColorStop(0,'rgba(0,0,0,0)');hz.addColorStop(1,th.haze);
  x.fillStyle=hz;x.fillRect(0,H*.56,W,H*.22);
  // ground
  const gg=x.createLinearGradient(0,H*.72,0,H);
  gg.addColorStop(0,th.ground[0]);gg.addColorStop(1,th.ground[1]);
  x.fillStyle=gg;x.fillRect(0,H*.72,W,H*.28);
  // ground sheen strip
  const sh=x.createLinearGradient(0,H*.72,0,H*.80);
  sh.addColorStop(0,th.haze);sh.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=sh;x.fillRect(0,H*.72,W,H*.08);
  // faint ground texture strokes
  x.globalAlpha=.12;x.fillStyle='#000';
  for(let i=0;i<26;i++)x.fillRect(rnd(0,W),rnd(H*.76,H),rnd(30,120),2);
  x.globalAlpha=1;
  bgCache[ti]=c;return c;
}

    opts.push({id:'maxhp40',icon:'heart',name:'Greater Vitality',desc:'Max HP +40 and fully restored'});
    const un3=Object.keys(SPELLS).filter(s=>!P.spells.includes(s));
    if(un3.length){const s=pick(un3);opts.push({id:'spell:'+s,icon:'book',name:'Learn '+SPELLS[s].name,desc:SPELLS[s].desc});}
  }
  if(tier===2){
    const un=Object.keys(SPELLS).filter(s=>!P.spells.includes(s));
    if(un.length){const s=pick(un);opts.push({id:'spell:'+s,icon:'book',name:'Learn '+SPELLS[s].name,desc:SPELLS[s].desc+' ('+SPELLS[s].mp+' MP)'});}
    opts.push({id:'maxhp',icon:'heart',name:'Vitality Up',desc:'Max HP +25 (and heal 25)'});
    opts.push({id:'maxmp',icon:'gem',name:'Wisdom Up',desc:'Max MP +10 (and restore 10)'});
    opts.push({id:'heal',icon:'sparkle',name:'Second Wind',desc:'Restore 60% of max HP'});
    opts.push({id:'bp:300',icon:'coin',name:'300 BP',desc:'A tidy purse of Battle Points'});
  }
  if(tier<=1){
    opts.push({id:'atk',icon:'sword',name:'Strength Up',desc:'Base ATK +4'});
    opts.push({id:'mag',icon:'orb',name:'Spirit Up',desc:'Magic power +4'});
    opts.push({id:'potions',icon:'potion',name:'Twin Potions',desc:'Add 2 Potions'});
    opts.push({id:'ether',icon:'orb',name:'Ether',desc:'Add 1 Ether'});
    opts.push({id:'bp:120',icon:'coin',name:'120 BP',desc:'A handful of Battle Points'});
  }
  if(tier>=2){
    // relic offer — swap or acquire (only one relic held)
    const rk=Object.keys(RELICS).filter(k=>k!==P.relic);
    if(rk.length){const r=pick(rk);opts.push({id:'relic:'+r,icon:RELICS[r].icon,name:RELICS[r].name,desc:'RELIC · '+RELICS[r].desc});}

let pendingFlourish=null;
function applyBoon(id){
  if(id==='wpn'){P.wpn++;pendingFlourish=['WEAPON UP!','#ffe25a'];}
  else if(id==='arm'){P.arm++;pendingFlourish=['ARMOR UP!','#8cf0a0'];}
  else if(id.startsWith('spell:')){P.spells.push(id.split(':')[1]);pendingFlourish=['SPELL LEARNED!','#c8a0ff'];}
  else if(id.startsWith('relic:')){P.relic=id.split(':')[1];pendingFlourish=[RELICS[P.relic].name.toUpperCase()+' EQUIPPED',(RELICS[P.relic].col||'#ff8ad0')];}
  else if(id.startsWith('bp:')){const amt=+id.split(':')[1];score+=amt;}
  else if(id==='heal')P.hp=Math.min(P.maxhp,P.hp+Math.round(P.maxhp*.6));
  else if(id==='maxhp'){P.maxhp+=25;P.hp=Math.min(P.maxhp,P.hp+25);pendingFlourish=['VITALITY UP!','#ff8ad0'];}
  else if(id==='maxhp40'){P.maxhp+=40;P.hp=P.maxhp;pendingFlourish=['GREATER VITALITY!','#ff8ad0'];}
  else if(id==='maxmp'){P.maxmp+=10;P.mp=Math.min(P.maxmp,P.mp+10);pendingFlourish=['WISDOM UP!','#8cb8ff'];}
  else if(id==='atk'){P.atk+=4;pendingFlourish=['STRENGTH UP!','#ffd23a'];}
  else if(id==='mag'){P.mag+=4;pendingFlourish=['SPIRIT UP!','#c8a0ff'];}
  else if(id==='potions')P.items.potion+=2;

}

  g.addColorStop(0,'rgba(0,0,0,'+a+')');g.addColorStop(1,'rgba(0,0,0,0)');

function drawSpotlights(){
  ctx.save();ctx.globalCompositeOperation='lighter';
  const cols=['#ff46c8','#5cf0ff','#ffe25a'];
  for(let i=0;i<3;i++){
    const baseX=W*(.25+i*.25);
    const sway=Math.sin(tGlobal*(.5+i*.18)+i*2.1)*160;
    const tx=baseX+sway, ox=baseX*.4+i*40-40;
    const a=.05+.03*Math.sin(tGlobal*.9+i*1.7);
    const g=ctx.createLinearGradient(ox,-20,tx,H*.9);
    g.addColorStop(0,hexA(cols[i],a+.13));
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(ox-14,-20);ctx.lineTo(ox+30,-20);
    ctx.lineTo(tx+130,H*.9);ctx.lineTo(tx-90,H*.9);ctx.closePath();ctx.fill();

function hexA(hex,a){const n=parseInt(hex.slice(1),16);return'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
function drawShafts(th){
  if(th.arena){drawSpotlights();return;}
  if(!th.shaft)return;
  ctx.save();ctx.globalCompositeOperation='lighter';
  for(let i=0;i<3;i++){
    const sx=(th.sun?th.sun.x:W*.5)+i*140-120;
    const sway=Math.sin(tGlobal*.35+i*2)*30;
    const a=.05+.03*Math.sin(tGlobal*.5+i);

    g.addColorStop(0,th.light.replace(/[\d.]+\)$/,(a+.06)+')'));
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.moveTo(sx-30,0);ctx.lineTo(sx+70,0);
    ctx.lineTo(sx+230+sway,H*.85);ctx.lineTo(sx+60+sway,H*.85);ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

    ctx.strokeStyle='rgba(255,240,140,'+a+')';ctx.lineWidth=6;ctx.lineJoin='round';
    ctx.beginPath();ctx.moveTo(b.pts[0].x,b.pts[0].y);for(const pt of b.pts)ctx.lineTo(pt.x,pt.y);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,'+a+')';ctx.lineWidth=2;ctx.stroke();ctx.restore();
    const last2=b.pts[b.pts.length-1];glow(last2.x,last2.y,90,'rgba(255,240,140,.8)',a);}
  boltsV=boltsV.filter(b=>b.t>0);

  for(const p of popups){p.t-=dt*.75;p.y-=dt*54;p.x+=p.vx*dt;
    const a=clamp(p.t*2,0,1),size=p.big?40:26;
    ctx.font='600 '+size+'px "Cormorant Garamond",Georgia,serif';
    ctx.textAlign='center';ctx.globalAlpha=a;

    ctx.fillStyle=p.color;ctx.fillText(p.txt,p.x,p.y);}

    ctx.fillRect(0,0,W,H);ctx.restore();

  ctx.restore();
  postProcess(th);

}
function drawTurnOrder(){
  if(gameState!=='battle'||!enemies)return;
  const live=enemies.filter(e=>e.hp>0&&e.deadT===undefined);
  if(live.length<2)return;
  const seq=[{n:'YOU',you:1},...live.map(e=>({n:e.name.split(' ')[0],you:0}))];
  ctx.save();
  ctx.font='600 12px Marcellus, serif';ctx.textBaseline='middle';ctx.textAlign='left';
  // measure
  let total=0;const gap=ctx.measureText(' ▸ ').width;
  const widths=seq.map(s=>ctx.measureText(s.n).width);
  total=widths.reduce((a,b)=>a+b,0)+gap*(seq.length-1)+ctx.measureText('TURN  ').width;
  let x=W/2-total/2, y=100;
  // backing pill
  ctx.fillStyle='rgba(6,8,16,.55)';
  roundRectPath(ctx,x-12,y-13,total+24,26,8);ctx.fill();
  ctx.fillStyle='#8a8478';ctx.fillText('TURN',x,y);x+=ctx.measureText('TURN  ').width;
  for(let i=0;i<seq.length;i++){
    ctx.fillStyle=seq[i].you?'#ffe25a':(i===1?'#ff8ad0':'#c8bca8');
    ctx.fillText(seq[i].n,x,y);x+=widths[i];
    if(i<seq.length-1){ctx.fillStyle='#5a6478';ctx.fillText(' ▸ ',x,y);x+=gap;}
  }
  ctx.restore();
}
function roundRectPath(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function arenaTint(){
  // magenta → cyan → gold → crimson as the run deepens; bosses skew hot
  const pals=['#c838d8','#38c8d8','#d8b838','#d85838','#8a48e8'];
  let idx=Math.floor(((round||1)-1)/2)%pals.length;
  const enc=(typeof encounterType==='function')?encounterType():'normal';
  if(enc==='boss'||enc==='mini')idx=3;
  if(enc==='champion')return '#ffd23a';

function postProcess(th){

  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(bloomC,0,0,W,H);
  ctx.restore();
  // tilt-shift: blurred copy masked to top + bottom bands
  tiltX.filter='blur(3px)';
  tiltX.globalCompositeOperation='source-over';
  tiltX.clearRect(0,0,tiltC.width,tiltC.height);

const STATUS={
  burn:  {icon:'fire',dot:.07,turns:3,col:'#ff8040',name:'Burn'},
  poison:{icon:'potion',dot:.06,turns:4,col:'#b070f0',name:'Poison'},
  freeze:{icon:'ice',skip:true,turns:1,col:'#8ce0ff',name:'Freeze'},
  stun:  {icon:'spiral',skip:true,turns:1,col:'#ffe25a',name:'Stun'},
  protect:{icon:'shield',turns:3,col:'#8cf0a0',name:'Protect'},
  focus: {icon:'sword',turns:3,col:'#ffd23a',name:'Focus'},
  defdown:{icon:'arrowdown',turns:3,col:'#ff8ad0',name:'Def Down'},
  regen: {icon:'heart',heal:.08,turns:4,col:'#7ce07a',name:'Regen'},
  haste: {icon:'haste',turns:3,col:'#5cf0ff',name:'Haste'},
  silence:{icon:'mute',turns:3,col:'#c8b0ff',name:'Silence'},
  doom:  {icon:'skull',turns:3,col:'#c088ff',name:'Doom'},
};
function hasStatus(ent,n){return !!(ent&&ent.st&&ent.st[n]>0);}
function applyStatus(ent,name){
  if(!ent)return;const d=STATUS[name];if(!d)return;
  if(ent!==P&&ent.immune&&ent.immune.includes(name)){
    const cc=enemyCenter(ent);addPopup(cc.x,cc.y-40,'IMMUNE','#9aa2b8');return;
  }
  if(ent===P&&P.relic==='warding'&&(name==='freeze'||name==='stun')){
    addPopup(P.cx,P.fy-170,'WARDED','#8cf0a0');return;
  }
  ent.st=ent.st||{};ent.st[name]=d.turns;
  const isP=ent===P;
  const px=isP?ent.cx:ent.cx, py=isP?ent.fy-170:enemyCenter(ent).y-46;
  addPopup(px,py,d.name.toUpperCase(),d.col);
}
// returns {skip, dot, heal, doom} — call at the START of the entity's turn
function tickStatus(ent){
  if(!ent||!ent.st)return{skip:false,dot:0,heal:0,doom:0};
  let skip=false,dot=0,heal=0,doom=0;
  const maxhp=ent===P?P.maxhp:ent.maxhp;
  for(const k of Object.keys(ent.st)){
    if(ent.st[k]<=0){delete ent.st[k];continue;}
    const d=STATUS[k];if(!d){delete ent.st[k];continue;}
    if(d.dot)dot+=Math.max(1,Math.round(maxhp*d.dot));
    if(d.heal)heal+=Math.max(1,Math.round(maxhp*d.heal));
    if(d.skip)skip=true;
    ent.st[k]--;
    if(k==='doom'&&ent.st[k]<=0)doom+=Math.round(maxhp*.45); // countdown detonates
    if(ent.st[k]<=0)delete ent.st[k];
  }
  return{skip,dot,heal,doom};
}
function statusKeys(ent){return ent&&ent.st?Object.keys(ent.st).filter(k=>ent.st[k]>0):[];}
// draw a row of vector status glyphs centered at x,y
function drawStatusRow(g,ent,x,y,r){
  const keys=statusKeys(ent);if(!keys.length)return;
  const step=r*2.6, total=(keys.length-1)*step;
  keys.forEach((k,i)=>{
    const d=STATUS[k];if(!d)return;
    const gx=x-total/2+i*step;
    g.save();g.globalAlpha=.35;g.fillStyle='#05070e';
    g.beginPath();g.arc(gx,y,r*1.5,0,Math.PI*2);g.fill();g.restore();
    drawGlyph(g,STATUS_GLYPH[k]||'sparkle',gx,y,r,d.col);
  });
}

/* ============================ DAMAGE ============================ */
async function damageEnemy(e,dmg,elem,opts){
  opts=opts||{};
  let mult=1,note='';
  if(elem===e.weak){mult=1.8;note=CFG.cbPalette?'WEAK ▲':'WEAK';}
  else if(elem===e.res){mult=.5;note=CFG.cbPalette?'RESIST ▼':'resist';}
  let final=Math.max(1,Math.round(dmg*mult+rnd(-2,2)));
  const crit=opts.crit;
  if(crit)final=Math.round(final*1.7);
  e.hp=Math.max(0,e.hp-final);
  e.flash=1;shake=Math.min(1,.3+final/70);
  // interrupt a charging boss if enough damage lands before it fires
  if(e.charging&&e.hp>0&&(e.chargeStart-e.hp)>=e.chargeInterrupt){
    e.charging=null;applyStatus(e,'stun');
    const cc=enemyCenter(e);callout('INTERRUPTED!','#5cf0ff');
    burst(cc.x,cc.y,['#5cf0ff','#fff','#ffe25a'],22,120,30,.6);
  }
  // champion transformation at half health
  if(e.phase2&&!e.phased&&e.hp>0&&e.hp/e.maxhp<=.5)triggerPhase2(e);
  punch(final>=28||mult>1||crit?.09:.05); // hit-stop
  const c=enemyCenter(e);
  if(final>=28||crit||mult>1)camPunch(crit?1.1:1.06,c.x,c.y);
  stats.dmgDealt+=final;score+=final;
  if(P.relic==='vampiric'&&P.hp<P.maxhp){const h=Math.round(final*.15);if(h>0){P.hp=Math.min(P.maxhp,P.hp+h);P.flash=1;addPopup(P.cx,P.fy-150,'+'+h,'#90ff90');}}
  bumpCombo();
  if(mult>1){stats.weakHits=(stats.weakHits||0)+1;score+=15;}
  // status infliction (burn/freeze/poison riders)
  if(opts.inflict&&e.hp>0&&Math.random()<(opts.inflictChance||.4))applyStatus(e,opts.inflict);
  // enrage: mark low-HP foes so their attacks hit harder
  if(e.behavior&&e.behavior.includes('enrage')&&!e.enraged&&e.hp>0&&e.hp/e.maxhp<=.35){
    e.enraged=true;callout(e.name+' is enraged!','#ff6048');
  }
  const dcol=crit?'#ffd23a':mult>1?'#ffe270':mult<1?'#9aa2b8':'#ffffff';
  addPopup(c.x,c.y-24,String(final),dcol,crit||mult>1||final>=30);
  if(crit)addPopup(c.x,c.y-58,'CRITICAL!','#ffd23a');
  else if(note)addPopup(c.x,c.y-56,note,mult>1?'#ff8858':'#9aa2b8');
  SFX.hit();
  updateStatus();
  if(e.hp<=0){
    await sleep(240);
    SFX.die();
    onEnemyDefeated(e,c,final,dmg*mult);
    e.deadT=1;
    const iv=setInterval(()=>{e.deadT-=.08;
      burst(c.x+rnd(-24,24),c.y+rnd(-24,24),['#ff6048','#ffa058','#fff'],3,60,-20,.5);
      if(e.deadT<=0){e.deadT=0;clearInterval(iv);}},40);
    await sleep(520);
    if(e.explosive)await explode(e,c);
  }else{
    // split: on first drop below half HP, spawn a smaller copy
    if(e.behavior&&e.behavior.includes('split')&&!e.hasSplit&&e.hp/e.maxhp<=.5&&enemies.filter(x=>x.hp>0).length<4){
      e.hasSplit=true;await splitEnemy(e);
    }
    await sleep(340);
  }
}
function onEnemyDefeated(e,c,killingBlow,rawDmg){
  let bp=25*round+(e.bonusBP||0);
  if(P.relic==='fortune')bp+=30;
  // overkill bonus — big finishing blows pay extra
  if(killingBlow>=e.maxhp*.4){bp+=Math.round(killingBlow);addPopup(c.x,c.y-96,'OVERKILL! +'+Math.round(killingBlow),'#ff8ad0');}
  score+=bp;addPopup(c.x,c.y-70,'+'+bp,'#e8cc88');
  LT.kills=(LT.kills||0)+1;
  if(e.phase2||e.phased)LT.champions=(LT.champions||0)+1;
  else if(e.boss)LT.bosses=(LT.bosses||0)+1;
  saveLT();
}
async function explode(e,c){
  callout('DEATH BURST!','#ff6048');flashScreen={c:'#ffb0a0',t:.4};SFX.fire();shake=1;
  burst(c.x,c.y,['#ff6048','#ffb040','#fff'],30,140,20,.8);
  await sleep(200);
  const dmg=Math.max(6,Math.round((e.atkS||14)*1.1));
  const before=P.hp;P.hp=Math.max(1,P.hp-dmg); // never lethal
  P.hurt=1;addPopup(P.cx,P.fy-150,String(before-P.hp),'#ff7860',true);

async function splitEnemy(e){
  callout(e.name+' splits!','#7ce07a');
  SFX.powerup();

function encounterType(){
  if(round%GAUNTLET===0)return'champion';
  if(round%5===0)return'boss';
  const r10=round%10;
  if(r10===3||r10===7)return'mini';
  return'normal';
}
function spawnEnemies(){
  enemies=[];
  const enc=encounterType();
  const m=1+(round-1)*0.22;
  if(enc==='champion'){
    const ci=Math.floor(round/GAUNTLET)-1;
    const champ=CHAMPIONS[ci%CHAMPIONS.length];
    enemies.push(makeEnemy(champ,1+ci*0.35,250,372,1));
  }else if(enc==='boss'){
    const b=BOSSES[(Math.floor(round/5)-1)%BOSSES.length];
    enemies.push(makeEnemy(b,1+(round-1)*0.16,250,366,1));
  }else if(enc==='mini'){
    const b=MINIBOSSES[(Math.floor(round/4))%MINIBOSSES.length];
    const e=makeEnemy(b,1+(round-1)*0.14,250,366,1);
    // roll an elite affix
    const af=pick(AFFIXES);af.apply(e);e.name=af.prefix+' '+e.name;e.affix=af.id;
    enemies.push(e);
  }else{
    const maxTier=round<=3?1:round<=6?2:3;
    const n=round===1?1:round<=2?2:ri(2,3);
    const pool=ENEMY_TYPES.filter(t=>t.tier<=maxTier);
    // [cx, fy, size, row] — back row sits higher/upstage
    const spots=n===1?[[250,360,1.06,'front']]
      :n===2?[[196,366,1.06,'front'],[300,326,.9,'back']]
      :[[160,368,1.08,'front'],[262,370,1.02,'front'],[236,320,.86,'back']];
    const casterIds=['mage','ghost','wraith'];
    let uniqueSlot=(round>=4&&Math.random()<.16)?ri(0,n-1):-1;
    // sort so casters prefer back-row slots
    const backSlots=spots.map((s,i)=>[s,i]).filter(([s])=>s[3]==='back');
    for(let i=0;i<n;i++){
      let e;
      if(i===uniqueSlot){e=makeUnique(pick(UNIQUES),m,spots[i][0],spots[i][1]);}
      else{let t=pick(pool);e=makeEnemy(t,m,spots[i][0],spots[i][1],spots[i][2]);}
      e.row=spots[i][3];
      enemies.push(e);
    }
    // if a caster ended up front while a bruiser is back, swap positions so casters hide
    if(n>=2){
      const front=enemies.filter(e=>e.row==='front'), back=enemies.filter(e=>e.row==='back');
      const frontCaster=front.find(e=>casterIds.includes(e.id));
      const backBruiser=back.find(e=>!casterIds.includes(e.id));
      if(frontCaster&&backBruiser){
        [frontCaster.cx,backBruiser.cx]=[backBruiser.cx,frontCaster.cx];
        [frontCaster.fy,backBruiser.fy]=[backBruiser.fy,frontCaster.fy];
        [frontCaster.row,backBruiser.row]=[backBruiser.row,frontCaster.row];
      }
    }
  }
  theme=ARENA_TI; // Battle Square arena is the one true stage
}

async function playerTurn(){
  if(P.hp<=0)return;
  P.defending=false;
  const ts=tickStatus(P);
  // regen status + Sage Ring relic healing
  let heal=ts.heal||0;
  if(P.relic==='regen'&&P.hp<P.maxhp)heal+=Math.round(P.maxhp*.05);
  if(heal>0&&P.hp<P.maxhp){
    P.hp=Math.min(P.maxhp,P.hp+heal);P.flash=1;
    addPopup(P.cx,P.fy-150,'+'+heal,'#90ff90');glow(P.cx,P.fy-64,90,'rgba(140,255,150,.5)',.7);
    updateStatus();await sleep(360);
  }
  // damage-over-time: venom handicap + burn/poison + doom detonation
  let dot=ts.dot||0;
  if(handicap==='venom')dot+=Math.max(1,Math.round(P.maxhp*.06));
  if(ts.doom){callout('DOOM!','#c088ff');dot+=ts.doom;flashScreen={c:'#c088ff',t:.4};SFX.dark();}
  if(dot>0){
    P.hp=Math.max(0,P.hp-dot);
    addPopup(P.cx,P.fy-150,String(dot),'#c890ff');
    glow(P.cx,P.fy-64,90,'rgba(150,80,255,.6)',.8);
    tone(240,120,.2,'sawtooth',.12);
    updateStatus();
    await sleep(500);
    if(P.hp<=0){await gameOver();return;}
  }
  if(ts.skip){
    callout('FROZEN!','#8ce0ff');
    await say(P.name+' is locked in place!',900);clearMsg();
    updateStatus();
    await enemyPhase();
    return;
  }
  // Haste: grant a bonus action this turn
  P.extraAction=hasStatus(P,'haste')?1:0;
  updateStatus();
  rootMenu();
}
async function onRoot(id){
  const frog=magicLocked(),noGuard=guardLocked();

    if(P.limit<100){SFX.err();return;}
    clearMenu();await doLimit();
  }else if(id==='attack'){
    const t=await chooseTarget();
    if(!t){rootMenu();return;}
    clearMenu();await doAttack(t);
  }else if(id==='magic'){
    if(frog){SFX.err();return;}
    const items=P.spells.map(s=>({id:s,label:SPELLS[s].name,right:mpCost(SPELLS[s].mp)+' MP',dis:P.mp<mpCost(SPELLS[s].mp)}));
    items.push({id:'back',label:'‹ Back'});

  }else if(id==='item'){

    const items=Object.keys(P.items).filter(k=>P.items[k]>0).map(k=>({id:k,label:ITEMS[k].name,right:'× '+P.items[k],rightClass:'cnt'}));
    if(!items.length)items.push({id:'none',label:'(no items)',dis:true});
    items.push({id:'back',label:'‹ Back'});
    showMenu(items,onItem);

    if(noGuard){SFX.err();return;}
    clearMenu();await doDefend();

async function doAttack(t){
  stats.turns++;
  await say(P.name+' attacks!',380);
  const c=enemyCenter(t);
  const dash=c.x+80-P.cx;
  // wind-up (pull back), then lunge
  for(let i=0;i<4;i++){P.ox=6*(i+1)/4;await sleep(14);}
  for(let i=0;i<7;i++){const e=1-Math.pow(1-(i+1)/7,2);P.ox=6+(dash-6)*e;await sleep(15);}
  slashes.push({x:c.x,y:c.y,t:1});
  SFX.slash();
  burst(c.x,c.y,['#ffffff','#c8dcff'],10,110,80,.4);
  const crit=Math.random()<0.12+(P.critUp||0);
  const wElem=WEAPON_ELEM[P.wpn]||'phys';
  if(wElem!=='phys'){glow(c.x,c.y,60,ELEM_COL[wElem],.7);}
  let dmg=(pAtk()+rnd(0,4))*effAtkMult()-effDef(t)/2;
  // formation: back-row foes take reduced melee damage while the front line stands
  const frontAlive=enemies.some(e=>e.hp>0&&e.row==='front');
  const guarded=t.row==='back'&&frontAlive;
  if(guarded){dmg*=.5;addPopup(c.x,c.y-58,'GUARDED','#9ab0d8');}
  await damageEnemy(t,Math.max(2,dmg),wElem,{crit,physDef:true});
  gainLimit(crit?13:9);
  for(let i=8;i>0;i--){P.ox=dash*i/8;await sleep(14);}
  P.ox=0;
  clearMsg();
  await endPlayerAction();
}

      const foes=live();if(!foes.length)break;
      const e=foes[i%foes.length];const c=enemyCenter(e);
      slashes.push({x:c.x+rnd(-14,14),y:c.y+rnd(-14,14),t:1});
      SFX.slash();punch(.05);burst(c.x,c.y,['#fff','#ffe25a','#ff8ad0'],8,120,60,.35);
      flashScreen={c:'#ffe8b0',t:.18};
      await damageEnemy(e,power*rnd(.55,.8),'phys');
      await sleep(90);
    }
    const rest=live();
    if(rest.length){flashScreen={c:'#ffffff',t:.5};SFX.fanfare();shake=1;
      for(const e of rest){const c=enemyCenter(e);burst(c.x,c.y,['#fff','#ffd23a'],14,150,40,.5);
        await damageEnemy(e,power*1.1,'phys');}}
  }
  clearMsg();updateStatus();
  await endPlayerAction();
}
async function endPlayerAction(){
  if(enemies.every(e=>e.hp<=0)){await roundWon();return;}
  // Haste: take a second action before the enemies move
  if(P.extraAction>0&&P.hp>0){
    P.extraAction--;
    callout('HASTE — extra action!','#5cf0ff');
    await sleep(300);
    rootMenu();
    return;
  }
  await enemyPhase();
}
async function enemyPhase(opening){
  for(const e of enemies){
    if(e.hp<=0)continue;
    // status ticks (burn/poison DoT + doom, freeze/stun skip)
    const ts=tickStatus(e);
    let edot=ts.dot||0;
    if(ts.doom){const cc=enemyCenter(e);callout('DOOM!','#c088ff');edot+=ts.doom;burst(cc.x,cc.y,['#c088ff','#7030c0','#301050'],24,110,-10,.9);SFX.dark();}
    if(edot){
      e.hp=Math.max(0,e.hp-edot);const cc=enemyCenter(e);
      addPopup(cc.x,cc.y-24,String(edot),'#c890ff');e.flash=1;
      burst(cc.x,cc.y,['#b070f0','#7030c0'],8,60,20,.4);
      updateStatus();await sleep(360);
      if(e.hp<=0){await enemyPerish(e);continue;}
    }
    if(ts.skip){
      await say(e.name+' is frozen solid!',720);clearMsg();continue;
    }
    const silenced=hasStatus(e,'silence');
    // release a telegraphed charge from last turn
    if(e.charging){
      const move=e.charging;e.charging=null;
      await say(e.name+' unleashes '+move.n+'!',700);
      camPunch(1.12,P.cx,P.fy-70);flashScreen={c:'#ffffff',t:.4};
      for(let i=0;i<6;i++){e.ox=(i+1)*11;await sleep(16);}
      if(move.t==='phys'){SFX.slash();slashes.push({x:P.cx-16,y:P.fy-66,t:1});await damagePlayer(e.atkS*move.p*enemyDmgMult()*1.5,'phys');}
      else{await spellVFX(move.t,P.cx,P.fy-66);await damagePlayer(e.magS*move.p*enemyDmgMult()*1.5,move.t);}
      for(let i=6;i>0;i--){e.ox=i*11;await sleep(13);}e.ox=0;clearMsg();
      if(P.hp<=0){await gameOver();return;}
      await sleep(120);continue;
    }
    // caster behaviours are blocked by Silence
    if(!silenced){
    // heal_ally
    if(e.behavior&&e.behavior.includes('heal_ally')){
      const hurt=enemies.filter(x=>x.hp>0&&x!==e&&x.hp/x.maxhp<.55).sort((a,b)=>a.hp/a.maxhp-b.hp/b.maxhp)[0];
      if(hurt&&Math.random()<.7){
        await say(e.name+' chants a mending hymn!',620);
        const cc=enemyCenter(hurt);
        glow(cc.x,cc.y,90,'rgba(140,255,150,.7)',1);rise(cc.x,cc.y+10,['#c0ffb8','#7ce07a','#fff'],18);SFX.heal();
        const amt=Math.round(hurt.maxhp*.3);hurt.hp=Math.min(hurt.maxhp,hurt.hp+amt);hurt.flash=1;
        addPopup(cc.x,cc.y-24,'+'+amt,'#90ff90');
        await sleep(620);clearMsg();continue;
      }
    }
    // harden
    if(e.behavior&&e.behavior.includes('harden')&&!e.hardened&&Math.random()<.35){
      e.hardened=true;e.defS=Math.round(e.defS*1.8);
      await say(e.name+' hardens its shell!',620);
      const cc=enemyCenter(e);glow(cc.x,cc.y,80,'rgba(180,200,255,.6)',1);e.flash=1;
      await sleep(620);clearMsg();continue;
    }
    // heal_self
    if(e.behavior&&e.behavior.includes('heal_self')&&e.hp/e.maxhp<.45&&Math.random()<.6){
      await say(e.name+' drains the aether to mend itself!',680);
      const cc=enemyCenter(e);glow(cc.x,cc.y,100,'rgba(124,240,255,.7)',1);rise(cc.x,cc.y+10,['#bfeaff','#7cf0ff','#fff'],20);SFX.heal();
      const amt=Math.round(e.maxhp*.22);e.hp=Math.min(e.maxhp,e.hp+amt);e.flash=1;
      addPopup(cc.x,cc.y-24,'+'+amt,'#7cf0ff');
      await sleep(680);clearMsg();continue;
    }
    // bosses telegraph a big charge instead of attacking (interruptable)
    if(e.boss&&!e.charging&&Math.random()<.4){
      const heavy=e.atks.slice().sort((a,b)=>b.p-a.p)[0];
      e.charging=heavy;e.chargeInterrupt=Math.round(e.maxhp*.14);e.chargeStart=e.hp;
      await say(e.name+' is charging '+heavy.n+'!  Strike hard to interrupt!',1200);
      const cc=enemyCenter(e);glow(cc.x,cc.y,110,'rgba(255,120,40,.6)',1);
      burst(cc.x,cc.y,['#ff9048','#ffd070','#ff5828'],20,70,-20,.7);SFX.dark();e.flash=1;
      callout('CHARGING','#ff8858');
      await sleep(700);clearMsg();continue;
    }
    }else if(Math.random()<.5){
      // a silenced caster fumbles
      await say(e.name+' is silenced!',620);clearMsg();
    }
    // normal attack (with swift double-strike support)
    await enemyStrike(e);
    if(P.hp<=0){await gameOver();return;}
    if(e.swift&&e.hp>0&&P.hp>0){
      await say(e.name+' strikes again!',560);
      await enemyStrike(e);
      if(P.hp<=0){await gameOver();return;}
    }
    clearMsg();
    await sleep(120);
  }
  if(opening){await say('Now — strike back!',800);clearMsg();}
  playerTurn();
}
async function enemyStrike(e){
  let pool=e.atks;
  if(hasStatus(e,'silence')){const phys=e.atks.filter(a=>a.t==='phys');if(phys.length)pool=phys;}
  const atk=pick(pool);
  await say(e.name+' — '+atk.n+'!',540);
  for(let i=0;i<4;i++){e.ox=-4*(i+1)/4;await sleep(13);}      // wind-up
  for(let i=0;i<6;i++){const t=1-Math.pow(1-(i+1)/6,2);e.ox=-4+(58)*t;e.oy=-Math.sin(t*Math.PI)*10;await sleep(14);} // lunge
  if(atk.fx)playAttackFX(atk.fx,atk.t);
  const rage=e.enraged?1.4:1;
  let dealt;
  if(atk.t==='phys'){
    SFX.slash();slashes.push({x:P.cx-16,y:P.fy-66,t:1});
    dealt=e.atkS*atk.p*enemyDmgMult()*rage;await damagePlayer(dealt,'phys');
    // Riposte relic: chance to counter a melee blow
    if(P.relic==='counter'&&P.hp>0&&e.hp>0&&Math.random()<.3){
      await say(P.name+' counters!',600);
      const cc=enemyCenter(e);slashes.push({x:cc.x,y:cc.y,t:1});SFX.slash();
      await damageEnemy(e,pAtk()*.6+8,'phys');clearMsg();
    }
  }else{
    if(!atk.fx)await spellVFX(atk.t,P.cx,P.fy-66);
    dealt=e.magS*atk.p*enemyDmgMult()*rage;await damagePlayer(dealt,atk.t);
  }
  // status riders — from element and from any elite affix
  if(P.hp>0){
    if(atk.t==='fire'&&Math.random()<.28)applyStatus(P,'burn');
    else if(atk.t==='ice'&&Math.random()<.24)applyStatus(P,'freeze');
    else if(atk.t==='bolt'&&Math.random()<.18)applyStatus(P,'stun');
    else if(atk.t==='dark'&&Math.random()<.22)applyStatus(P,'poison');
    if(e.attackRider&&Math.random()<.4)applyStatus(P,e.attackRider);
    updateStatus();
  }
  if(e.behavior&&e.behavior.includes('lifesteal')&&e.hp>0){
    const drain=Math.round(dealt*.4);e.hp=Math.min(e.maxhp,e.hp+drain);
    const cc=enemyCenter(e);addPopup(cc.x,cc.y-24,'+'+drain,'#ff8ad0');e.flash=1;
  }
  for(let i=6;i>0;i--){e.ox=(58)*i/6;e.oy=0;await sleep(12);}
  e.ox=0;e.oy=0;
}
// signature attack visuals
function playAttackFX(fx,elem){
  const col=ELEM_COL[elem]||'#fff';
  if(fx==='cone'){ // breath cone toward the hero
    SFX.fire();flashScreen={c:col,t:.4};
    for(let i=0;i<28;i++){const t=i/28;particles.push({x:250+t*(P.cx-250),y:300+rnd(-40*t,40*t),
      vx:rnd(60,160),vy:rnd(-40,40),g:0,t:.5,c:pick([col,'#fff','#ffd070']),sz:rnd(3,7),gl:true});}
    camPunch(1.08,P.cx,P.fy-70);
  }else if(fx==='ring'){ // nova expanding ring
    SFX.bolt();flashScreen={c:col,t:.45};
    for(let i=0;i<40;i++){const a=i/40*Math.PI*2;particles.push({x:P.cx,y:P.fy-70,vx:Math.cos(a)*140,vy:Math.sin(a)*140,g:0,t:.45,c:col,sz:5,gl:true});}
    camPunch(1.1,P.cx,P.fy-70);
  }else if(fx==='shock'){ // ground shockwave
    SFX.hit();shake=1;flashScreen={c:'#ffe0a0',t:.3};
    for(let i=0;i<30;i++){particles.push({x:P.cx+rnd(-40,40),y:P.fy,vx:rnd(-120,120),vy:rnd(-160,-40),g:300,t:.6,c:pick(['#c8a060','#8a6a40','#fff']),sz:rnd(3,6),gl:false});}
    camPunch(1.09,P.cx,P.fy);
  }
}
async function enemyPerish(e){
  const c=enemyCenter(e);SFX.die();
  onEnemyDefeated(e,c,e.maxhp,e.maxhp);
  e.deadT=1;
  const iv=setInterval(()=>{e.deadT-=.08;burst(c.x+rnd(-24,24),c.y+rnd(-24,24),['#ff6048','#ffa058','#fff'],3,60,-20,.5);
    if(e.deadT<=0){e.deadT=0;clearInterval(iv);}},40);
  await sleep(400);
  if(e.explosive)await explode(e,c);
  if(enemies.every(x=>x.hp<=0)){await roundWon();}
}
async function roundWon(){
  handicap=null;P.pose='win';updateStatus();
  SFX.fanfare();
  callout('VICTORY!','#ffe25a');
  await say('Battle '+round+' won!',900);

  const hpPct=P.hp/P.maxhp;
  const lines=[];

  const hpB=Math.round(hpPct*100)*2; lines.push(['HP remaining ('+Math.round(hpPct*100)+'%)','+'+hpB]);
  let flawless=0,itemfree=0,styleB=0,hcB=0,streakB=0;
  if(bstat.noHit){flawless=150;lines.push(['Flawless — no damage','+150']);}
  if(flawlessStreak>=2){streakB=flawlessStreak*60;lines.push(['Flawless streak ×'+flawlessStreak,'+'+streakB]);}
  if(bstat.items===0){itemfree=80;lines.push(['No items used','+80']);}
  if(battleMaxCombo>=3){styleB=battleMaxCombo*20;lines.push(['Style · combo ×'+battleMaxCombo,'+'+styleB]);}
  if(handicapCleared){hcB=140;lines.push(['Handicap defied','+140']);}
  const total=base+hpB+flawless+itemfree+styleB+hcB+streakB;
  // lifetime stats + achievements
  LT.battlesWon=(LT.battlesWon||0)+1;
  LT.bestCombo=Math.max(LT.bestCombo||0,battleMaxCombo);
  LT.maxRound=Math.max(LT.maxRound||0,round);

  for(const a of newAch){callout(a.name.toUpperCase(),'#ffd23a');SFX.fanfare();await sleep(900);}
  // ---- gauntlet milestone ----
  if(round===GAUNTLET){await gauntletClear();}

}

const overlay=$('#overlay'),sheet=$('#sheet');
function hideOverlay(){overlay.classList.add('hidden');}
function showOverlay(){overlay.classList.remove('hidden');}
const REEL_SYMS=['sword','shield','book','heart','gem','orb','potion','frog','burst','skull','angry','coin','sparkle','swords'];
const MED_HC=['frog','bleed','silence','weaken','venom','sealed','doublecost','dazed'];
const HARD_HC=['fragile','fury','berserk','overload','venom'];
function rollWagers(){
  const jackpot=Math.random()<(0.08+Math.min(round,12)*0.008);
  const cards=[];
  cards.push({klass:'safe',head:'PLAY IT SAFE',hc:null,boon:makeBoon(1)});
  cards.push({klass:'gamble',head:'GAMBLE',hc:pick(MED_HC),boon:makeBoon(2)});
  if(jackpot)cards.push({klass:'jackpot',head:'7-7-7 JACKPOT',hc:null,boon:makeBoon(3),jp:200+round*40});
  else cards.push({klass:'wild',head:'HIGH ROLL',hc:pick(HARD_HC),boon:makeBoon(3)});
  return cards;
}
function spinReel(strip,finalSym,dur){
  return new Promise(res=>{
    let t=0,delay=45;
    (function step(){
      strip.innerHTML=ic(pick(REEL_SYMS),34);
      tone(1100,1100,.015,'square',.04);
      t+=delay;
      if(t<dur){delay=45+(t/dur)*150;setTimeout(step,delay);}
      else{strip.innerHTML=ic(finalSym,34,finalSym==='seven'?'#ffe25a':null);tone(320,180,.12,'square',.16);res();}
    })();
  });
}
async function showSlot(){
  gameState='slot';
  let rerollLeft=SHOP.owned.reroll?1:0;
  await runSlot(rollWagers(),rerollLeft);
}
async function runSlot(wagers,rerollLeft){
  const jackpot=wagers[2].klass==='jackpot';
  sheet.innerHTML=
    '<div class="slot-title">HANDICAP REELS</div>'+
    '<div class="subtitle" style="font-size:clamp(11px,1.9vmin,15px);margin-bottom:0">The reels deal the hand — you choose how to play it</div>'+
    '<div class="reels"><div class="reel"><span class="strip">'+ic('question',34)+'</span></div>'+
      '<div class="reel"><span class="strip">'+ic('question',34)+'</span></div>'+
      '<div class="reel"><span class="strip">'+ic('question',34)+'</span></div></div>'+
    '<div class="wagers" id="wagers"></div>'+
    (rerollLeft>0?'<button class="mbtn" id="reroll" style="min-width:38%;padding:1% 3%;font-size:clamp(12px,2.2vmin,17px)">'+ic('reroll',15)+' Re-spin ('+rerollLeft+')</button>':'');
  showOverlay();
  const strips=[...sheet.querySelectorAll('.reel .strip')];
  const finals=jackpot?['seven','seven','seven']
    :[wagers[0].boon.icon,(wagers[1].hc?HANDICAPS[wagers[1].hc].icon:'coin'),wagers[2].boon.icon];
  await Promise.all([spinReel(strips[0],finals[0],1000),spinReel(strips[1],finals[1],1550),spinReel(strips[2],finals[2],2150)]);

function revealWagers(wagers){
  const box=$('#wagers');box.innerHTML='';
  wagers.forEach((w,idx)=>{
    const b=document.createElement('button');
    b.className='wager '+w.klass;

      ? '<div class="wcost"><span class="wico">'+ic(hc.icon,26)+'</span><span>Next battle:<br><span class="wname" style="color:#ffb0b0">'+hc.name+'</span> — '+hc.desc+'</span></div>'

    b.innerHTML='<div class="whead">'+w.head+'</div><div class="wbody">'+

/* ============================ SCORES / STORAGE ============================ */
const SCORE_KEY='endlessSaga.battleSquare.highscores';
let memScores=[];
function loadScores(){
  try{const r=localStorage.getItem(SCORE_KEY);memScores=r?JSON.parse(r):[];}
  catch(e){/* private-mode or disabled storage */}
  return memScores;
}
function saveScore(entry){
  let scores=loadScores();
  scores.push(entry);
  scores.sort((a,b)=>b.score-a.score);
  scores=scores.slice(0,10);
  memScores=scores;
  try{localStorage.setItem(SCORE_KEY,JSON.stringify(scores));}catch(e){}
  return scores;
}
