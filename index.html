    const btn=owned?'<span style="color:#7ce07a">OWNED</span>'
      :'<button class="tog'+(afford?'':'')+'" data-id="'+it.id+'" '+(afford?'':'disabled style="opacity:.4"')+'>'+it.cost+' BP</button>';
    return '<div class="card" style="cursor:default"><span class="cicon">'+ic(it.icon,30)+'</span>'+
      '<span class="cname">'+it.name+'</span>'+it.desc+'<div style="margin-top:8%">'+btn+'</div></div>';
  });
  // three per row via flex wrap
  sheet.innerHTML='<div class="slot-title" style="font-size:clamp(16px,3.6vmin,28px)">BP EMPORIUM</div><hr class="rule">'+
    '<div class="subtitle" style="font-size:clamp(12px,2vmin,16px)">Banked: <b style="color:#ffe25a">'+SHOP.bank+' BP</b> — permanent upgrades for every future run</div>'+
    '<div class="cards" style="flex-wrap:wrap;gap:1.6%">'+cards.join('')+'</div>'+
    '<button class="mbtn" id="shopBack">‹ Back</button>';
  sheet.querySelectorAll('button[data-id]').forEach(b=>b.addEventListener('click',()=>{
    const it=SHOP_ITEMS.find(x=>x.id===b.dataset.id);
    if(SHOP.owned[it.id]||SHOP.bank<it.cost){SFX.err();return;}
    SHOP.bank-=it.cost;SHOP.owned[it.id]=true;saveShop();SFX.powerup();openShop();
  }));
  $('#shopBack').addEventListener('click',()=>{SFX.back();showTitle();});
  showOverlay();
}

/* ============================ SCREENS ============================ */
function showTitle(){
  gameState='title';
  clearMenu();clearMsg();
  startMusic('title');
  $('#cmdwin').style.visibility='hidden';
  $('#statwin').style.visibility='hidden';
  $('#ribbon').classList.add('hidden');
  $('#hcbadge').classList.add('hidden');
  $('#pausebtn').classList.add('hidden');
  $('#bossbar').classList.add('hidden');
  sheet.innerHTML=
   '<div class="slot-title" style="font-size:clamp(13px,2.6vmin,20px);letter-spacing:.4em;margin-bottom:0">THE GOLD SAUCER</div>'+
   '<div class="title-big">BATTLE SQUARE</div>'+
   '<hr class="rule">'+
   '<div class="subtitle">One fighter. Eight battles. The reels decide your curse —<br><span style="color:#5cf0ff">you decide how to beat it.</span></div>'+
   '<button class="mbtn" id="bStart">Enter the Arena</button>'+
   '<button class="mbtn" id="bScores">Hall of Champions</button>'+
   '<button class="mbtn" id="bAch">Achievements</button>'+
   '<button class="mbtn" id="bShop">BP Emporium</button>'+
   '<button class="mbtn" id="bSettings">Settings</button>'+
   '<div class="subtitle" style="margin-top:3%;font-size:clamp(11px,1.9vmin,15px)">↑ ↓ move · Enter confirm · Esc back — or simply tap</div>';
  $('#bStart').addEventListener('click',()=>{SFX.ok();showCharSelect();});
  $('#bScores').addEventListener('click',async()=>{SFX.ok();showScores();});
  $('#bAch').addEventListener('click',()=>{SFX.ok();showAchievements();});
  $('#bShop').addEventListener('click',()=>{SFX.ok();openShop();});
  $('#bSettings').addEventListener('click',()=>{SFX.ok();openSettings(showTitle);});
  showOverlay();
}
function showCharSelect(){
  gameState='charselect';
  const cards=CHARACTERS.map((c,i)=>{
    const stats='HP '+c.maxhp+' · MP '+c.maxmp+' · ATK '+c.atk+' · MAG '+c.mag+(c.critUp?' · CRIT+':'');
    return '<button class="card" data-i="'+i+'"><img class="portrait" src="'+heroPortrait(i,0,0,120)+'" alt="">'+
      '<span class="cname">'+c.name+'</span>'+c.blurb+
      '<div style="margin-top:6%;font-size:.85em;color:#9aa2b8">'+stats+'</div>'+
      '<div style="margin-top:4%;color:#ffd23a;font-size:.85em">'+ic('star',13)+' '+c.limitName+'</div></button>';
  }).join('');
  sheet.innerHTML='<div class="slot-title" style="font-size:clamp(16px,3.6vmin,28px)">CHOOSE YOUR CHAMPION</div><hr class="rule">'+
    '<div class="cards">'+cards+'</div>'+
    '<button class="mbtn" id="csBack" style="margin-top:2.5%">‹ Back</button>';
  sheet.querySelectorAll('button[data-i]').forEach(b=>{
    b.addEventListener('mouseenter',()=>SFX.move());
    b.addEventListener('click',()=>{SFX.ok();startGame(+b.dataset.i);});
  });
  $('#csBack').addEventListener('click',()=>{SFX.back();showTitle();});
  showOverlay();
}
function showAchievements(){
  gameState='achievements';
  const rows=ACHIEVEMENTS.map(a=>{
    const got=!!LT.ach[a.id];
    return '<div class="setrow" style="margin:1.4% 6%;opacity:'+(got?1:.5)+'"><span>'+ic(a.icon,15)+' <b style="color:'+(got?'#ffd23a':'#8a8478')+'">'+a.name+'</b> — '+a.desc+'</span><span>'+(got?ic('check',13):'—')+'</span></div>';
  }).join('');
  const stat=(l,v)=>'<div class="sumrow" style="margin:.5% 10%"><span>'+l+'</span><b>'+v+'</b></div>';
  sheet.innerHTML='<div class="slot-title" style="font-size:clamp(16px,3.6vmin,28px)">ACHIEVEMENTS</div><hr class="rule">'+
    rows+'<hr class="rule">'+
    stat('Runs played',LT.runs||0)+stat('Battles won',LT.battlesWon||0)+stat('Foes defeated',LT.kills||0)+
    stat('Bosses felled',(LT.bosses||0)+(LT.champions||0))+stat('Gauntlets cleared',LT.gauntlets||0)+
    stat('Best combo','×'+(LT.bestCombo||0))+stat('Best run',(LT.bestBP||0)+' BP')+
    '<button class="mbtn" id="aBack">‹ Back</button>';
  $('#aBack').addEventListener('click',()=>{SFX.back();showTitle();});
  showOverlay();
}
async function showScores(){
  const scores=await loadScores();
  let rows=scores.length?scores.map((s,i)=>'<tr><td>'+(i+1)+'</td><td class="r">'+s.score+'</td><td class="r">'+s.rounds+'</td><td>'+s.date+'</td></tr>').join('')
    :'<tr><td colspan="4">No champions yet — go make history.</td></tr>';
  sheet.innerHTML='<div class="slot-title" style="font-size:clamp(16px,3.6vmin,28px)">HALL OF CHAMPIONS</div><hr class="rule">'+
    '<table><tr><th>#</th><th class="r">BP</th><th class="r">Battles</th><th>Date</th></tr>'+rows+'</table>'+
    '<button class="mbtn" id="bBack">‹ Back</button>';
  $('#bBack').addEventListener('click',()=>{SFX.back();showTitle();});
}
function startGame(charIdx){
  if(charIdx!=null)chosenChar=charIdx;
  P=newPlayer();round=0;score=0;bpShown=0;
  handicap=null;pendingHandicap=null;handicapCleared=false;
  P.limit=0;P.revive=false;P.relic=null;flawlessStreak=0;
  applyShopToPlayer();
  LT.runs=(LT.runs||0)+1;saveLT();
  combo=0;battleMaxCombo=0;runMaxCombo=0;
  stats={rounds:0,dmgDealt:0,dmgTaken:0,turns:0,spells:0,weakHits:0};
  particles=[];popups=[];slashes=[];boltsV=[];ambient=[];
  hideOverlay();
  $('#cmdwin').style.visibility='visible';
  $('#statwin').style.visibility='visible';
  $('#pausebtn').classList.remove('hidden');
  updateStatus();
  startRound();
}
async function gameOver(){
  // Second Life: revive once per run instead of dying
  if(P&&P.revive){
    P.revive=false;P.pose=null;
    P.hp=Math.round(P.maxhp*.35);P.st={};
    callout('SECOND LIFE','#7ce07a');
    flashScreen={c:'#c0ffd0',t:.5};SFX.fanfare();
    const hc=heroCenter();glow(hc.x,hc.y,150,'rgba(140,255,150,.9)',1);
    burst(hc.x,hc.y,['#c0ffb8','#7ce07a','#fff'],30,120,-30,.9);
    await say(P.name+' refuses to fall!',1400);clearMsg();
    updateStatus();
    playerTurn();
    return;
  }
  gameState='gameover';
  clearMenu();
  stopMusic();
  if(P)P.pose='dead';
  paused=false;closeModal();
  $('#pausebtn').classList.add('hidden');
  $('#hcbadge').classList.add('hidden');
  $('#bossbar').classList.add('hidden');
  SFX.gameover();
  burst(P.cx,P.fy-66,['#ff6048','#902020','#ffffff'],36,140,120,1.1);
  await say(P.name+' has fallen…',1600);
  clearMsg();
  // bank the run's Battle Points for the Emporium
  SHOP.bank+=score;saveShop();
  LT.deaths=(LT.deaths||0)+1;LT.bestBP=Math.max(LT.bestBP||0,score);LT.totalBP=(LT.totalBP||0)+score;LT.maxRound=Math.max(LT.maxRound||0,round-1);saveLT();checkAchievements();
  const entry={score,rounds:round-1,date:new Date().toLocaleDateString()};
  const scores=await saveScore(entry);
  const rank=scores.findIndex(s=>s===entry)+1;
  const cleared=round-1>=GAUNTLET;
  sheet.innerHTML=
   '<img class="portrait dead" src="'+heroPortrait(chosenChar,P.arm,P.wpn,130)+'" alt="">'+
   '<div class="pname-lbl">'+(CHARACTERS[chosenChar]||CHARACTERS[0]).name.toUpperCase()+'</div>'+
   '<div class="title-big" style="font-size:clamp(18px,4.6vmin,38px);background:linear-gradient(180deg,#ffb0a0,#e05840 55%,#6a1c14);-webkit-background-clip:text;background-clip:text;">'+(cleared?'THE CROWD FALLS SILENT':'DEFEATED')+'</div>'+
   '<hr class="rule">'+
   '<div class="sumrow"><span>Battles won</span><b>'+(round-1)+(cleared?' '+ic('star',12):'')+'</b></div>'+
   '<div class="sumrow"><span>Best combo</span><b>×'+runMaxCombo+'</b></div>'+
   '<div class="sumrow"><span>Damage dealt</span><b>'+stats.dmgDealt+'</b></div>'+
   '<div class="sumrow"><span>Weakness strikes</span><b>'+(stats.weakHits||0)+'</b></div>'+
   '<div class="sumrow" style="border-top:1px solid rgba(255,70,200,.4);padding-top:1.2%"><span style="color:#ffe25a">BATTLE POINTS</span><b style="color:#ffe25a">'+score+'</b></div>'+
   '<div class="sumrow"><span>Banked total</span><b style="color:#ffe25a">'+SHOP.bank+' BP</b></div>'+
   (rank>0?'<div class="subtitle" style="margin-top:1%">'+(rank===1?'NEW CHAMPION — Rank I':'Hall of Champions — rank '+rank)+'</div>':'')+
   '<button class="mbtn" id="bAgain">Fight Again</button>'+
   '<button class="mbtn" id="bShop2">BP Emporium</button>'+
   '<button class="mbtn" id="bTitle">Title Screen</button>';
  $('#bAgain').addEventListener('click',()=>{SFX.ok();startGame();});
  $('#bShop2').addEventListener('click',()=>{SFX.ok();openShop();});
  $('#bTitle').addEventListener('click',()=>{SFX.back();showTitle();});
  showOverlay();
}

/* boot */
showTitle();
document.addEventListener('pointerdown',()=>{ac();if(gameState==='title'&&!muted)startMusic('title');},{once:true});
/* PWA service worker (offline + installable). Safe no-op when unsupported or opened via file://. */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
</html>
