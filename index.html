<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2a1350">
<title>SwipeFox</title>
<style>
  :root{ --pink:#ff5e9c; --teal:#2be0d0; --gold:#ffce54; --cream:#ffe8c8; --ink:#180a30; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:var(--ink); touch-action:none; overscroll-behavior:none;
    font-family:'Segoe UI', system-ui, sans-serif; user-select:none; -webkit-user-select:none; }
  #game { position:fixed; inset:0; } canvas { display:block; }

  /* HUD */
  #hud { position:fixed; inset:0; pointer-events:none; display:none; z-index:5; }
  #hud.active { display:block; }
  #scoreBox { position:absolute; top:calc(env(safe-area-inset-top,0px) + 12px); left:14px; color:var(--teal); font-weight:800; font-size:18px; letter-spacing:2px; text-shadow:0 0 10px #0cc; }
  #healthWrap { position:absolute; top:calc(env(safe-area-inset-top,0px) + 14px); right:14px; }
  #healthBar { width:120px; height:12px; border:2px solid var(--teal); border-radius:6px; overflow:hidden; box-shadow:0 0 10px rgba(43,224,208,.6); }
  #healthFill { height:100%; width:100%; background:linear-gradient(90deg,#ff5e9c,#ffce54,#2be0d0); transition:width .2s; }
  #powerRow { display:flex; gap:5px; justify-content:flex-end; margin-top:6px; }
  .pchip { font-size:10px; font-weight:800; letter-spacing:1px; padding:2px 7px; border-radius:10px; color:#180a30; background:var(--cream); opacity:.35; }
  .pchip.on { opacity:1; box-shadow:0 0 10px currentColor; }
  #chip-laser.on{ background:#ffce54; } #chip-shield.on{ background:var(--teal); }
  #comboBox { position:absolute; top:calc(env(safe-area-inset-top,0px) + 40px); left:14px; color:#ffce54; font-weight:800; font-size:15px; letter-spacing:1px; text-shadow:0 0 8px #a70; opacity:0; transition:opacity .2s; }
  #bannerFlash { position:absolute; top:42%; left:50%; transform:translate(-50%,-50%); color:var(--pink); font-weight:900; font-size:min(10vw,48px); letter-spacing:3px; text-shadow:0 0 24px #f39; opacity:0; text-transform:uppercase; text-align:center; }
  #progressBar { position:absolute; bottom:calc(env(safe-area-inset-bottom,0px) + 10px); left:50%; transform:translateX(-50%); width:55%; height:5px; background:rgba(255,255,255,.14); border-radius:3px; }
  #progressFill { height:100%; width:0%; background:var(--teal); border-radius:3px; box-shadow:0 0 6px #0cc; }
  #bossWrap { position:absolute; top:calc(env(safe-area-inset-top,0px) + 66px); left:50%; transform:translateX(-50%); width:76%; display:none; }
  #bossName { color:var(--pink); font-size:11px; font-weight:800; letter-spacing:3px; text-align:center; margin-bottom:3px; text-shadow:0 0 8px #f39; }
  #bossBar { height:9px; border:2px solid var(--pink); border-radius:5px; overflow:hidden; box-shadow:0 0 12px rgba(255,94,156,.6); }
  #bossFill { height:100%; width:100%; background:linear-gradient(90deg,#ff5e9c,#c13d8f); transition:width .15s; }
  #pauseBtn { position:absolute; top:calc(env(safe-area-inset-top,0px) + 62px); right:14px; pointer-events:auto; width:34px; height:34px; border-radius:9px; border:2px solid rgba(255,255,255,.4); background:rgba(24,10,48,.5); color:#fff; font-size:15px; display:flex; align-items:center; justify-content:center; }

  #damageVig,#lowVig,#speedVig,#warnVig { position:fixed; inset:0; pointer-events:none; z-index:6; opacity:0; }
  #damageVig { background:radial-gradient(ellipse at center, transparent 55%, rgba(255,40,90,.7) 100%); transition:opacity .5s; }
  #lowVig { background:radial-gradient(ellipse at center, transparent 60%, rgba(255,60,80,.55) 100%); }
  #speedVig { z-index:4; background:radial-gradient(ellipse at center, transparent 62%, rgba(255,255,255,.10) 100%); transition:opacity .25s; }
  #warnVig { background:radial-gradient(ellipse at center, transparent 45%, rgba(255,80,40,.55) 100%); transition:opacity .12s; }

  /* Screens */
  .screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#3a1f6e 0%, #a63d8f 42%, #ff7e6b 74%, #ffd9a8 100%); z-index:10; overflow:hidden; }
  .screen.night { background:linear-gradient(180deg,#0a0a30 0%, #1a1050 40%, #3a1a5a 70%, #6a2a6a 100%); }
  .screen::before{ content:""; position:absolute; left:-10%; right:-10%; bottom:0; height:44%;
    background: repeating-linear-gradient(90deg, transparent 0 46px, rgba(43,224,208,.5) 46px 48px), repeating-linear-gradient(0deg, transparent 0 40px, rgba(43,224,208,.35) 40px 42px);
    transform:perspective(300px) rotateX(70deg); transform-origin:bottom; opacity:.7; mask-image:linear-gradient(180deg,transparent,#000 40%); }
  .sun{ position:absolute; top:15%; width:min(52vw,280px); height:min(52vw,280px); border-radius:50%;
    background:linear-gradient(180deg,#fff3d0,#ff9e5e 55%,#ff5e9c); filter:blur(1px); box-shadow:0 0 90px rgba(255,120,150,.7); overflow:hidden; }
  .sun::after{ content:""; position:absolute; inset:0; background:repeating-linear-gradient(0deg, transparent 0 14px, rgba(58,31,110,.9) 14px 20px); mask-image:linear-gradient(180deg,transparent 45%,#000 55%); }
  .hidden { display:none !important; }

  #logo { text-align:center; margin-top:2vh; z-index:2; animation:floaty 4s ease-in-out infinite; }
  #logo .fox { font-size:min(18vw,88px); font-weight:900; font-style:italic; letter-spacing:-2px; line-height:.9;
    background:linear-gradient(180deg,#fff 0%, #ffe8c8 30%, #ff5e9c 62%, #6b3fa0 100%); -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 3px 0 #2a1350) drop-shadow(0 0 30px rgba(255,120,180,.85)); text-transform:uppercase; transform:perspective(300px) rotateX(16deg); }
  #logo .sub { color:#fff; font-size:min(3.6vw,15px); letter-spacing:8px; margin-top:14px; text-transform:uppercase; text-shadow:0 0 12px rgba(43,224,208,.9); }
  @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .btn { pointer-events:auto; padding:14px 46px; font-size:18px; font-weight:800; letter-spacing:3px; color:#2a1350;
    background:linear-gradient(180deg,#fff0d0,#ff9ec4); border:none; border-radius:40px; text-transform:uppercase; z-index:2;
    box-shadow:0 0 24px rgba(255,120,180,.6), 0 4px 0 #a63d8f; cursor:pointer; margin-top:1.6vh; }
  .btn:active { transform:translateY(3px); box-shadow:0 0 24px rgba(255,120,180,.6), 0 1px 0 #a63d8f; }
  .btn.small{ padding:11px 28px; font-size:14px; }
  .btn.ghost{ background:rgba(255,255,255,.12); color:#fff; box-shadow:none; border:2px solid rgba(255,255,255,.5); }
  .btn:disabled{ opacity:.4; }
  .hint { color:#fff; opacity:.92; font-size:13px; margin-top:20px; letter-spacing:1px; text-align:center; line-height:1.9; z-index:2; text-shadow:0 1px 4px rgba(0,0,0,.4); }
  .bigtitle { font-size:min(11vw,52px); font-weight:900; letter-spacing:2px; margin-bottom:6px; text-transform:uppercase; z-index:2; color:#fff; text-shadow:0 0 24px rgba(43,224,208,.9); }

  /* level select cards */
  #levelCards{ z-index:2; display:flex; flex-direction:column; gap:12px; width:min(88vw,380px); margin:1vh 0 2vh; }
  .lvlCard{ pointer-events:auto; display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-radius:16px;
    background:rgba(24,10,48,.5); border:2px solid rgba(255,255,255,.25); color:#fff; cursor:pointer; backdrop-filter:blur(5px); }
  .lvlCard:active{ transform:scale(.98); }
  .lvlCard.locked{ opacity:.5; }
  .lvlCard .t{ font-weight:800; letter-spacing:2px; font-size:16px; }
  .lvlCard .s{ font-size:11px; opacity:.8; letter-spacing:1px; margin-top:2px; }
  .lvlCard .m{ font-size:24px; }

  /* end / leaderboard / options panels */
  #medal{ z-index:2; font-size:52px; margin-bottom:2px; filter:drop-shadow(0 0 16px rgba(255,206,84,.8)); }
  #medalLabel{ z-index:2; color:var(--gold); font-weight:800; letter-spacing:3px; margin-bottom:1vh; text-transform:uppercase; }
  #endStats{ z-index:2; color:#fff; text-align:center; line-height:1.8; font-size:15px; margin-bottom:1.4vh; text-shadow:0 1px 4px rgba(0,0,0,.4); }
  #endStats b{ color:var(--gold); }
  #nameEntry{ z-index:2; display:none; margin-bottom:1vh; text-align:center; color:#fff; }
  #nameEntry input{ text-transform:uppercase; text-align:center; width:120px; font-size:20px; letter-spacing:6px; padding:6px; border-radius:10px; border:2px solid var(--teal); background:rgba(0,0,0,.3); color:#fff; }
  #board{ z-index:2; width:min(84vw,340px); margin-bottom:1.4vh; color:#fff; font-size:13px; }
  #board .row{ display:flex; justify-content:space-between; padding:5px 10px; border-bottom:1px solid rgba(255,255,255,.15); letter-spacing:1px; }
  #board .row b{ color:var(--gold); }

  #optPanel{ z-index:2; width:min(86vw,360px); background:rgba(24,10,48,.55); border:2px solid rgba(255,255,255,.25); border-radius:18px; padding:18px 22px; backdrop-filter:blur(6px); }
  .optRow{ display:flex; align-items:center; justify-content:space-between; margin:13px 0; color:#fff; font-size:14px; letter-spacing:1px; }
  .optRow input[type=range]{ width:150px; accent-color:#ff5e9c; }
  .toggle{ pointer-events:auto; width:52px; height:28px; border-radius:14px; background:rgba(255,255,255,.2); position:relative; border:none; }
  .toggle.on{ background:var(--teal); }
  .toggle::after{ content:""; position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; transition:left .15s; }
  .toggle.on::after{ left:27px; }
  .row2{ display:flex; gap:10px; z-index:2; }
  .warnArrow{ position:absolute; pointer-events:none; opacity:0; transition:opacity .45s; z-index:5; filter:drop-shadow(0 0 8px #ff5060); width:0; height:0; }
  #warn-left{ left:8px; top:50%; transform:translateY(-50%); border-top:14px solid transparent; border-bottom:14px solid transparent; border-right:22px solid #ff5e6b; }
  #warn-right{ right:8px; top:50%; transform:translateY(-50%); border-top:14px solid transparent; border-bottom:14px solid transparent; border-left:22px solid #ff5e6b; }
  #warn-bottom{ bottom:46px; left:50%; transform:translateX(-50%); border-left:14px solid transparent; border-right:14px solid transparent; border-top:22px solid #ff5e6b; }
  #forkHint{ position:absolute; bottom:calc(env(safe-area-inset-bottom,0px) + 26px); left:50%; transform:translateX(-50%); color:#fff; font-weight:800; letter-spacing:2px; font-size:15px; opacity:0; transition:opacity .2s; text-shadow:0 0 12px #f39; }
  #debug{ position:fixed; left:8px; bottom:8px; z-index:9; color:#7fffd0; font:11px/1.45 ui-monospace,monospace; background:rgba(0,0,0,.45); padding:6px 9px; border-radius:6px; display:none; white-space:pre; pointer-events:none; }
  #debug.on{ display:block; }
  #statsList{ z-index:2; width:min(86vw,360px); margin:1vh 0 2vh; color:#fff; font-size:13px; max-height:54vh; overflow:auto; }
  #statsList .row{ display:flex; justify-content:space-between; padding:7px 11px; border-bottom:1px solid rgba(255,255,255,.15); letter-spacing:1px; }
  #statsList .row b{ color:var(--gold); }
  #version{ position:absolute; bottom:10px; right:12px; z-index:3; color:rgba(255,255,255,.6); font-size:11px; letter-spacing:2px; }
  /* solar map */
  #solarMap{ z-index:2; position:relative; width:100%; max-width:640px; height:340px; margin:1vh 0 1.5vh; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; border-top:1px solid rgba(255,255,255,.12); border-bottom:1px solid rgba(255,255,255,.12); }
  #solarInner{ position:relative; width:1120px; height:340px; }
  #solarEdges{ position:absolute; inset:0; width:1120px; height:340px; pointer-events:none; }
  .pnode{ position:absolute; transform:translate(-50%,-50%); text-align:center; pointer-events:auto; cursor:pointer; width:112px; }
  .pnode.locked{ cursor:default; opacity:.55; }
  .planet{ width:74px; height:74px; border-radius:50%; margin:0 auto 8px; position:relative; box-shadow: inset -9px -9px 16px rgba(0,0,0,.55), inset 6px 6px 12px rgba(255,255,255,.10), 0 0 26px var(--pg,rgba(255,180,220,.5)); }
  .planet.locked{ box-shadow:none; border:2px dashed rgba(255,255,255,.4); background:rgba(255,255,255,.06); }
  .planet .pshine{ position:absolute; top:11%; left:15%; width:34%; height:30%; border-radius:50%; background:radial-gradient(circle,rgba(255,255,255,.85),transparent 70%); filter:blur(2px); pointer-events:none; }
  .planet .pring{ position:absolute; left:-26%; top:37%; width:152%; height:26%; border-radius:50%; border:3px solid rgba(255,255,255,.4); transform:rotate(-18deg); box-shadow:0 0 8px rgba(255,255,255,.25); pointer-events:none; }
  .pnode .pt{ color:#fff; font-weight:800; font-size:12px; letter-spacing:1px; text-shadow:0 1px 3px rgba(0,0,0,.5); }
  .pnode .pm{ font-size:16px; }
  .pnode.cur .planet{ outline:3px solid #fff; outline-offset:3px; }
  /* boss arrival cinematics */
  #bossStrobe{ position:fixed; inset:0; pointer-events:none; z-index:7; opacity:0; background:radial-gradient(ellipse at center, transparent 40%, rgba(255,30,40,.6) 100%); transition:opacity .1s; }
  #screenDark{ position:fixed; inset:0; pointer-events:none; z-index:6; opacity:0; background:rgba(4,2,12,.55); transition:opacity 1s; }
  #bossWarn{ position:fixed; inset:0; z-index:8; display:none; align-items:center; justify-content:center; pointer-events:none; }
  #bossWarn span{ color:#ff4060; font-weight:900; font-size:min(11vw,60px); letter-spacing:6px; text-shadow:0 0 30px #f03; animation:warnPulse .7s steps(2) infinite; text-align:center; }
  @keyframes warnPulse{ 0%{opacity:1} 50%{opacity:.25} 100%{opacity:1} }
  #bossWrap{ transition:opacity .4s; }
  #combatText{ position:fixed; inset:0; pointer-events:none; z-index:6; }
  #combatText .ct{ position:absolute; font-weight:900; font-size:20px; letter-spacing:1px; text-shadow:0 0 10px rgba(0,0,0,.6); opacity:0; transform:translate(-50%,-50%); }
</style>
</head>
<body>
<div id="game"></div>

<div id="hud">
  <div id="scoreBox">000000</div>
  <div id="healthWrap"><div id="healthBar"><div id="healthFill"></div></div>
    <div id="powerRow"><span class="pchip" id="chip-laser">LASER 1</span><span class="pchip" id="chip-shield">SHIELD</span></div></div>
  <div id="comboBox"></div>
  <div id="bannerFlash"></div>
  <div id="bossWrap"><div id="bossName">MOTHERSHIP</div><div id="bossBar"><div id="bossFill"></div></div></div>
  <div class="warnArrow" id="warn-left"></div><div class="warnArrow" id="warn-right"></div><div class="warnArrow" id="warn-bottom"></div>
  <div id="forkHint"></div>
  <button id="pauseBtn">❚❚</button>
  <div id="progressBar"><div id="progressFill"></div></div>
</div>
<div id="damageVig"></div><div id="lowVig"></div><div id="speedVig"></div><div id="warnVig"></div><div id="debug"></div>
<div id="screenDark"></div><div id="bossStrobe"></div><div id="bossWarn"><span>⚠ WARNING ⚠</span></div>

<div id="startScreen" class="screen">
  <div class="sun"></div>
  <div id="logo"><div class="fox">Swipe<br>Fox</div></div>
  <button class="btn" id="playBtn">Play</button>
  <div class="row2"><button class="btn ghost small" id="statsBtnMenu">Stats</button><button class="btn ghost small" id="optBtnMenu">Options</button></div>
  <div class="hint">DRAG to fly &amp; auto-fire · HOLD STILL to charge<br>FLICK ← → barrel roll</div>
  <div id="version">v0.6</div>
</div>

<div id="levelScreen" class="screen hidden">
  <div class="bigtitle">Select Mission</div>
  <div id="solarMap"><div id="solarInner"><svg id="solarEdges" viewBox="0 0 1120 340" preserveAspectRatio="none"></svg><div id="solarNodes"></div></div></div>
  <button class="btn ghost small" id="lvlBack">Back</button>
</div>

<div id="optScreen" class="screen hidden">
  <div class="bigtitle" id="optTitle">Options</div>
  <div id="pauseInfo" style="display:none;color:#ffd24a;font-weight:800;letter-spacing:1px;margin-bottom:6px;text-align:center;"></div>
  <div id="optPanel">
    <div class="optRow"><span>Music</span><input type="range" id="sMusic" min="0" max="1" step="0.05"></div>
    <div class="optRow"><span>Sound FX</span><input type="range" id="sSfx" min="0" max="1" step="0.05"></div>
    <div class="optRow"><span>Drag sensitivity</span><input type="range" id="sSens" min="0" max="1" step="0.05"></div>
    <div class="optRow"><span>Haptics</span><button class="toggle" id="sHaptics"></button></div>
    <div class="optRow"><span>Colour-blind mode</span><button class="toggle" id="sCB"></button></div>
    <div class="optRow"><span>Debug overlay</span><button class="toggle" id="sDebug"></button></div>
  </div>
  <div class="row2"><button class="btn small" id="optResume" style="display:none">Resume</button>
    <button class="btn ghost small" id="optQuit" style="display:none">Quit</button>
    <button class="btn ghost small" id="optBack">Back</button></div>
</div>

<div id="endScreen" class="screen hidden">
  <div class="bigtitle" id="endTitle">Mission Complete</div>
  <div id="medal">🏅</div><div id="medalLabel">Gold</div>
  <div id="endStats"></div>
  <div id="nameEntry">NEW HIGH SCORE<br><input id="initials" maxlength="3" value="FOX"></div>
  <div id="board"></div>
  <div class="row2"><button class="btn small" id="retryBtn">Retry</button>
    <button class="btn ghost small" id="endMenu">Missions</button></div>
</div>

<div id="statsScreen" class="screen hidden">
  <div class="bigtitle">Pilot Record</div>
  <div id="statsList"></div>
  <button class="btn ghost small" id="statsBack">Back</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
/* ================= SwipeFox v0.4 ================= */
const W=()=>innerWidth,H=()=>innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(W(),H()); renderer.outputEncoding=THREE.sRGBEncoding;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.getElementById('game').appendChild(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(74,W()/H(),0.1,1200); camera.position.set(0,6.5,11);
const AREA={x:7,yMin:1.2,yMax:12}; const FORWARD_SPEED=40, CHARGE_TIME=1.0;

/* lights (kept, retinted per biome) */
const amb=new THREE.AmbientLight(0x9a7ad0,0.5); scene.add(amb);
const key=new THREE.DirectionalLight(0xffd9b0,1.55); key.position.set(18,46,-10); scene.add(key);
key.castShadow=true; key.shadow.mapSize.set(2048,2048);
{ const sc=key.shadow.camera; sc.left=-42; sc.right=42; sc.top=48; sc.bottom=-16; sc.near=1; sc.far=240; sc.updateProjectionMatrix(); }
key.shadow.bias=-0.0009; key.shadow.normalBias=0.02;
key.target.position.set(0,0,-45); scene.add(key.target);
const rimA=new THREE.DirectionalLight(0xff5e9c,0.5); rimA.position.set(20,10,20); scene.add(rimA);
const rimB=new THREE.DirectionalLight(0x2be0d0,0.38); rimB.position.set(-20,8,10); scene.add(rimB);

/* ---------- Palette (colour-blind aware) ---------- */
const PAL={ normal:{laser:0x39ff88,ebullet:0xff5aa0,retBracket:0xff3b6b,retCross:0xffe14d,deflect:0x66ffcc},
           cb:{laser:0x66eaff,ebullet:0xff9500,retBracket:0xffffff,retCross:0x66eaff,deflect:0xffd000} };
let pal=PAL.normal;

/* ================= BIOMES ================= */
function makeSkyTex(stops){ const c=document.createElement('canvas'); c.width=16; c.height=256; const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,256); stops.forEach(s=>g.addColorStop(s[0],s[1])); x.fillStyle=g; x.fillRect(0,0,16,256);
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; return t; }
function makeGroundTex(base,gridA,gridB){ const c=document.createElement('canvas'); c.width=c.height=512; const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,512); g.addColorStop(0,base[0]); g.addColorStop(1,base[1]); x.fillStyle=g; x.fillRect(0,0,512,512);
  for(let i=0;i<380;i++){ x.fillStyle=Math.random()<.5?gridA+'20':gridB+'20'; x.beginPath(); x.arc(Math.random()*512,Math.random()*512,10+Math.random()*40,0,7); x.fill(); }
  x.lineWidth=2; x.strokeStyle=gridA+'8c'; for(let i=0;i<=512;i+=32){ x.beginPath(); x.moveTo(i,0); x.lineTo(i,512); x.stroke(); }
  x.strokeStyle=gridB+'73'; for(let i=0;i<=512;i+=32){ x.beginPath(); x.moveTo(0,i); x.lineTo(512,i); x.stroke(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(26,26); t.encoding=THREE.sRGBEncoding; return t; }
function sunTex(inner,mid,outer,cut){ const c=document.createElement('canvas'); c.width=c.height=128; const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,128); g.addColorStop(0,inner); g.addColorStop(.55,mid); g.addColorStop(1,outer); x.fillStyle=g; x.beginPath(); x.arc(64,64,62,0,7); x.fill();
  if(cut){ x.globalCompositeOperation='destination-out'; for(let y=70;y<128;y+=10) x.fillRect(0,y,128,5); }
  const t=new THREE.CanvasTexture(c); t.encoding=THREE.sRGBEncoding; return t; }

const BIOMES={

  const S=1.75,T=0.17,L=0.9;
  for(const [sx,sy] of [[-1,-1],[1,-1],[1,1],[-1,1]]){
    g.add(bar(L+T*1.8,T*2.0,sx*(S-L/2),sy*S,outline)); g.add(bar(T*2.0,L+T*1.8,sx*S,sy*(S-L/2),outline));

  // — Intro (0-25): learn the controls —
  add(2,()=>{ for(let i=0;i<3;i++) spawnEnemy(0,'front'); });
  add(8,()=>spawnFormation(0,5));
  add(13,()=>{ spawnObstacle('ring',-200); spawnObstacle('ring',-270); });
  add(18,()=>{ spawnEnemy(1,'front'); spawnEnemy(1,'front'); spawnEnemy(8,'side'); });
  add(24,()=>{ spawnEnemy(3,'side'); spawnEnemy(4,'behind'); });
  // — Build 1 (25-55) —
  add(30,()=>spawnArchRun());
  add(36,()=>{ spawnEnemy(2,'front'); spawnEnemy(7,'front'); });
  add(40,()=>spawnCluster(0,4));
  add(45,()=>{ spawnObstacle('spire',-201,-3); spawnObstacle('monolith',-201,3); });
  add(48,()=>{ spawnEnemy(5,'front'); spawnEnemy(5,'side'); spawnEnemy(8,'side'); });
  add(54,()=>{ spawnObstacle('ring',-200); spawnObstacle('ring',-260); });
  // — MINIBOSS (60) —
  add(60,()=>spawnMiniboss(lvl));
  add(66,()=>{ if(!miniboss) spawnEnemy(3,'side'); });
  add(74,()=>{ spawnCluster(3,4); spawnObstacle('reactor',-240,0); });
  // — Build 2 (80-112) —
  add(82,()=>{ spawnEnemy(6,'front'); spawnEnemy(7,'side'); });
  add(88,()=>spawnFormation(0,6));
  add(94,()=>spawnArchRun());
  add(98,()=>spawnCanyon());
  add(103,()=>{ spawnEnemy(2,'front'); spawnEnemy(4,'behind'); });
  add(105,()=>spawnCluster(0,5));
  add(107,()=>{ spawnEnemy(5,'front'); spawnEnemy(5,'behind'); spawnEnemy(8,'side'); });
  // — CALM FLYTHROUGH BEAT (114-128): a valley —
  add(114,()=>{ musicIntensity=1; spawnArchRun(); });
  add(119,()=>{ spawnObstacle('ring',-200); spawnObstacle('ring',-250); });
  add(126,()=>{ spawnObstacle('ring',-200); spawnObstacle('ring',-260); });
  // — Build 3 / escalation (130-170) —
  add(130,()=>{ musicIntensity=1; spawnEnemy(1,'front'); spawnEnemy(3,'side'); });
  add(137,()=>spawnFormation(8,5));
  add(144,()=>{ spawnEnemy(6,'front'); spawnEnemy(7,'front'); spawnEnemy(5,'behind'); });
  add(151,()=>{ spawnEnemy(2,'front'); spawnEnemy(2,'front'); spawnEnemy(4,'behind'); spawnEnemy(8,'side'); });
  add(158,()=>{ for(let i=0;i<2;i++){ spawnEnemy(0,'front'); spawnEnemy(8,'side'); spawnEnemy(5,'behind'); } });
  add(150,()=>spawnCluster(0,5));
  add(165,()=>{ spawnEnemy(6,'front'); spawnEnemy(6,'front'); spawnEnemy(7,'side'); });
  // — Pre-boss: guaranteed heal + lull —
  add(172,()=>{ spawnPickup('health',new THREE.Vector3(0,ship?ship.position.y:5,-120)); musicIntensity=1; });
  return q.sort((a,b)=>a.t-b.t); }
function addBranchWaves(){ const base=elapsed;
  const extra = branch==='hard'
    ? [[1,()=>{ spawnEnemy(2,'front'); spawnEnemy(6,'side'); }],[3,()=>spawnFormation(5,3)],[5,()=>{ spawnEnemy(7,'front'); spawnEnemy(4,'behind'); }]]
    : [[2,()=>spawnEnemy(0,'front')],[4,()=>spawnEnemy(3,'side')]];
  extra.forEach(([o,fn])=>waveQueue.push({t:base+o,fn})); waveQueue.sort((a,b)=>a.t-b.t); }

  // rotating radar detail
  const detail=new THREE.Mesh(new THREE.TorusGeometry(1.2,0.06,8,24),trimMat); detail.position.set(0,2.4,-1); g.add(detail);
  // core housing with armour plates that OPEN in phase 2

  { const T=g.userData.targets; for(const pod of pods){ T.push({isWeak:true,position:new THREE.Vector3(),part:pod,alive:()=>pod.userData.hp>0 && g.userData.mode==='fight' && !g.userData.dead}); } T.push({isWeak:true,position:new THREE.Vector3(),part:core,alive:()=>g.userData.phase===2 && g.userData.coreHp>0 && g.userData.mode==='fight' && !g.userData.dead}); bossTargets=T; }

let pointer={down:false,x:0,y:0,downTime:0,moved:0,charging:false,lastMoveT:0,stillT:0,chargeProg:0}; const TAP_MAX_MS=220,TAP_MAX_MOVE=14; let lastMove={x:0,y:0,t:0};
function screenToWorld(px,py){ const nx=(px/W())*2-1, ny=1-(py/H())*2; return { x:nx*AREA.x, y:THREE.MathUtils.clamp(((ny+1)/2)*(AREA.yMax-AREA.yMin)+AREA.yMin,AREA.yMin,AREA.yMax) }; }
function triggerRoll(dir){ if(rollAnim>0||flipAnim>0||dodgeCd>0) return; rollAnim=0.5; invuln=Math.max(invuln,0.5); dodgeCd=0.35; ship.userData.rollDir=dir; sfx.roll(); }
function onDown(e){ if(state!=='play') return; const t=e.touches?e.touches[0]:e; pointer.down=true; pointer.moved=0; pointer.charging=false; pointer.chargeProg=0; pointer.x=t.clientX; pointer.y=t.clientY; pointer.downTime=performance.now(); pointer.lastMoveT=performance.now(); pointer.stillT=0; lastMove={x:t.clientX,y:t.clientY,t:performance.now()}; fire(false); fireTimer=FIRE_INTERVAL; }
function onMove(e){ if(!pointer.down||state!=='play') return; const t=e.touches?e.touches[0]:e; const now=performance.now(), dt=Math.max(now-lastMove.t,1); const dxr=t.clientX-lastMove.x, dyr=t.clientY-lastMove.y; const vx=dxr/dt, vy=dyr/dt;
  if(Math.abs(vx)>FLICK_SPEED && Math.abs(vx)>Math.abs(vy)*1.4) triggerRoll(vx>0?1:-1);
  const sc=0.6+settings.sens*1.2; const SX=(AREA.x*2)/(W()*0.55)*sc, SY=(AREA.yMax-AREA.yMin)/(H()*0.42)*sc;
  target.x=THREE.MathUtils.clamp(target.x+dxr*SX,-AREA.x,AREA.x);
  target.y=THREE.MathUtils.clamp(target.y-dyr*SY,AREA.yMin,AREA.yMax);
  const md=Math.hypot(dxr,dyr); pointer.moved+=md; if(md>1.2){ pointer.lastMoveT=now; pointer.stillT=0; }
  lastMove={x:t.clientX,y:t.clientY,t:now}; pointer.x=t.clientX; pointer.y=t.clientY; }
function onUp(){ if(!pointer.down) return; const wasCharged=pointer.chargeProg>=1; pointer.down=false; pointer.charging=false; if(wasCharged){ fire(true); vibrate(18); } stopChargeSound(); lockMarker.visible=false; lockTarget=null; pointer.chargeProg=0; pointer.stillT=0; }
addEventListener('touchstart',onDown,{passive:true}); addEventListener('touchmove',onMove,{passive:true}); addEventListener('touchend',onUp);
addEventListener('mousedown',onDown); addEventListener('mousemove',onMove); addEventListener('mouseup',onUp);

function endGame(win){ state='end'; stopMusic(); stopChargeSound(); $('hud').classList.remove('active'); lowVig.style.opacity='0'; warnVig.style.opacity='0'; document.getElementById('forkHint').style.opacity='0'; $('bossWarn').style.display='none'; $('bossStrobe').style.opacity='0'; $('screenDark').style.opacity='0'; recordLifetime(win);
  $('endScreen').classList.toggle('night',(mode==='endless'?false:level===2));
  $('endTitle').textContent = win?'Mission Complete':'Ship Down';
  const acc=stats.shots?Math.round(stats.hits/stats.shots*100):0; const final=Math.round(score);
  const keyName = mode==='endless'?'swipefox_best_endless':('swipefox_best_l'+level);
  const prevBest=+(localStorage.getItem(keyName)||0); const best=Math.max(final,prevBest); localStorage.setItem(keyName,best);
  if(win && mode==='campaign' && level===1) localStorage.setItem('swipefox_unlock2','1');
  const total=careerTotal(); const isRecord=final>prevBest;

/* ================= MAIN LOOP ================= */
let last=performance.now();
function tick(now){ requestAnimationFrame(tick); const rdt=Math.min((now-last)/1000,0.05); last=now;
  let dt=rdt*timeScale; if(hitStop>0){ hitStop-=rdt; dt=0; } if(timeScale<1) timeScale=Math.min(timeScale+rdt*0.5,1);
  if(starField) starField.rotation.y+=rdt*0.005;

  if(state==='play'){
    playSec+=rdt;
    if(mode==='campaign' && !bossSpawned) elapsed+=dt;
    // waves
    while(waveQueue.length && elapsed>=waveQueue[0].t){ waveQueue.shift().fn(); }
    if(mode==='campaign' && !bossSpawned){ progressFill.style.width=Math.min(elapsed/180*100,100)+'%'; if(elapsed>=180 && enemies.length<3 && !miniboss && !forkGates) spawnBoss(level); }
    if(mode==='campaign' && !bossSpawned && !miniboss && !forkGates){ const calm=elapsed>112 && elapsed<128, preboss=elapsed>173;
      if(!calm && !preboss && elapsed>3){ campaignSpawnT-=dt; if(campaignSpawnT<=0 && enemies.length<18){ campaignSpawnT=1.3+Math.random()*0.7; const smalls=[0,0,3,8,8]; if(Math.random()<0.14){ spawnCluster(smalls[(Math.random()*smalls.length)|0],3); } else { spawnEnemy(smalls[(Math.random()*smalls.length)|0]); if(Math.random()<0.22) spawnEnemy(smalls[(Math.random()*smalls.length)|0]); } } } }
    if(mode==='endless'){ endlessT+=dt; diffMul=1+endlessT/60*0.8; endlessSpawnT-=dt;
      if(endlessSpawnT<=0){ endlessSpawnT=Math.max(0.4,0.95-endlessT/120); const t=(Math.random()*9)|0; spawnEnemy(t); if(Math.random()<Math.min(0.4,endlessT/150)) spawnEnemy((Math.random()*9)|0); if(Math.random()<0.06) spawnObstacle(Math.random()<.5?'ring':'pillar',-200); } }

    if(comboT>0){ comboT-=rdt; if(comboT<=0){ combo=0; comboBox.style.opacity='0'; } }
    if(shieldTime>0){ shieldTime-=rdt; shieldMesh.visible=true; shieldMesh.material.opacity=0.12+Math.sin(now*0.01)*0.06; if(shieldTime<=0){ shieldMesh.visible=false; updateChips(); } }
    if(dodgeCd>0) dodgeCd-=rdt;

    // clear stale locks
    if(!validTarget(lockTarget)) lockTarget=null; if(!validTarget(retLock)) retLock=null;
    // soft aim target under the crosshair (aim assist)
    const soft=softTarget();
    // fire model: autofire while touching & moving; hold STILL to charge
    let charging=false;
    if(pointer.down){
      const held=(now-pointer.downTime)/1000;
      const stillNow=(now-pointer.lastMoveT)>120;
      if(stillNow) pointer.stillT+=rdt; else pointer.stillT=0;
      if(pointer.stillT>0.10 && held>0.15) charging=true;
      if(charging){ pointer.charging=true; startChargeSound();
        pointer.chargeProg=Math.min((pointer.stillT-0.10)/CHARGE_TIME,1); const p=pointer.chargeProg, full=p>=1; const c=full?0xffffff:laserColor();
        if(!validTarget(lockTarget) && soft){ lockTarget=soft; sfx.lock(); }
        for(const gg of gunGlows){ gg.material.color.setHex(c); gg.material.opacity=full?0.9+Math.sin(now*0.03)*0.1:0.35+p*0.55; gg.scale.setScalar(full?1.9+Math.sin(now*0.03)*0.25:1+p*1.0); }
        chargeOrb.visible=true; chargeOrb.material.color.setHex(c); chargeOrb.material.opacity=full?0.95:0.25+p*0.6; chargeOrb.scale.setScalar(full?1.15+Math.sin(now*0.03)*0.12:0.4+p*0.8); chargeOrb.rotation.y+=0.3; chargeOrb.rotation.x+=0.2; chargeOrb.children[0].material.opacity=full?0.6+Math.sin(now*0.04)*0.2:0.12+p*0.35;
        chargeRing.material.opacity=full?0.85+Math.sin(now*0.02)*0.15:0.25+p*0.5; chargeRing.material.color.setHex(c); chargeRing.scale.setScalar(1.25-p*0.25); chargeRing.rotation.z+=rdt*(1+p*3);
      } else {
        pointer.chargeProg=0; pointer.charging=false; stopChargeSound();
        fireTimer-=rdt; if(fireTimer<=0){ fire(false); fireTimer=FIRE_INTERVAL; }
      }
    }
    if(!charging){ for(const gg of gunGlows){ gg.material.color.setHex(0x8ff0ff); gg.material.opacity=0.3; gg.scale.setScalar(1); } chargeOrb.visible=false; chargeRing.material.opacity=0; }

    // dodge animation (barrel roll = Z spin)
    if(rollAnim>0){ rollAnim-=dt; ship.rotation.z+=(ship.userData.rollDir||1)*dt/0.5*Math.PI*2; if(Math.random()<0.6) spawnGhost(); }
    if(invuln>0) invuln-=dt;
    hurtFlash=Math.max(0,hurtFlash-rdt); ship.visible = hurtFlash>0 ? ((Math.floor(now*0.03)&1)===0) : true;

    // ship spring
    const ax=(target.x-ship.position.x)*26-vel.x*8, ay=(target.y-ship.position.y)*26-vel.y*8; vel.x+=ax*dt;
    vel.y+=ay*dt; ship.position.y+=vel.y*dt;
    ship.position.x+=vel.x*dt;
    ship.position.x=THREE.MathUtils.clamp(ship.position.x,-AREA.x,AREA.x); ship.position.y=THREE.MathUtils.clamp(ship.position.y,AREA.yMin,AREA.yMax);
    if(rollAnim<=0) ship.rotation.z=THREE.MathUtils.clamp(-vel.x*0.06,-0.9,0.9);
    ship.rotation.x=THREE.MathUtils.clamp(vel.y*0.03,-0.4,0.4);
    trails[0].scale.z=0.7+Math.random()*0.5; trails[1].scale.z=0.7+Math.random()*0.5;
    const spd=Math.hypot(vel.x,vel.y); speedVig.style.opacity=Math.min((spd+(rollAnim>0?30:0))/40,0.6);

    // low health fx
    if(health<35 && health>0){ lowVig.style.opacity=(0.3+Math.sin(now*0.008)*0.25).toFixed(2); lowWarnT-=rdt; if(lowWarnT<=0){ lowWarnT=0.8; sfx.warn(); }
      if(Math.random()<0.4){ const s=new THREE.Mesh(new THREE.SphereGeometry(0.3,6,5),new THREE.MeshBasicMaterial({color:0x333333,transparent:true,opacity:.6,fog:false})); s.position.copy(ship.position); s.position.z+=1.6; s.userData={smoke:true,v:new THREE.Vector3((Math.random()-.5)*2,(Math.random()-.5)*2,6),life:0.7,max:0.7}; scene.add(s); booms.push(s); } } else lowVig.style.opacity='0';

    // reticule: hard lock fully snaps + homes; soft aim only gently bends toward the target
    const manual=_mret.set(ship.position.x*1.35,ship.position.y*1.12,ship.position.z-RETICULE_DIST);
    const hard=validTarget(retLock)?retLock:(validTarget(lockTarget)?lockTarget:null);
    let aimP;
    if(hard){ aimP=targetPos(hard); lockMarker.visible=true; lockMarker.position.copy(aimP); lockMarker.rotation.z+=rdt*2.5; lockMarker.scale.setScalar(1.15+Math.sin(now*0.012)*0.12); }
    else if(soft){ aimP=_asoft.copy(manual).lerp(soft.position,0.4); lockMarker.visible=false; }
    else { aimP=manual; lockMarker.visible=false; }
    reticule.position.lerp(aimP,0.45);
    reticule.rotation.z+=rdt*0.4; reticule.scale.setScalar(1+Math.sin(now*0.006)*0.05);

    // chase camera (Star Fox-style): behind + above, ship sits low, view opens ahead
    camera.position.x+=(ship.position.x*0.3-camera.position.x)*3*dt;
    camera.position.y+=((ship.position.y*0.28+6.4)-camera.position.y)*3*dt;
    camera.position.z+=(11-camera.position.z)*3*dt;
    camera.lookAt(ship.position.x*0.34, ship.position.y*0.5+3.4, ship.position.z-40);
    if(shakeAmt>0){ camera.position.x+=(Math.random()-.5)*shakeAmt; camera.position.y+=(Math.random()-.5)*shakeAmt; shakeAmt=Math.max(0,shakeAmt-rdt*2.5); }

    // scenery scroll
    for(const s of scenery){ s.position.z+=(s.userData.cloud?FORWARD_SPEED*0.4:FORWARD_SPEED)*dt; if(s.position.z>25){ s.position.z=-440-Math.random()*60; if(!s.userData.cloud) s.position.x=(Math.random()<.5?-1:1)*(9+Math.random()*32); } }

    updateEnemies(dt); updateMiniboss(dt); updateBoss(dt,now); updateFork(dt); updatePickups(dt); updateMines(dt); updateObstacles(dt); updateEnemyBullets(dt); updateLasers(dt);
  }

  // ghosts (motion streak) always fade
  for(const g of ghosts){ if(g.life>0){ g.life-=rdt; g.m.material.opacity=Math.max(g.life/0.25,0)*0.5; if(g.life<=0) g.m.visible=false; } }
  for(const f of floatPool){ if(f.life>0){ f.life-=rdt; f.y-=42*rdt; f.el.style.top=f.y+'px'; const k=Math.max(f.life/0.95,0); f.el.style.opacity=String(k); f.el.style.transform=`translate(-50%,-50%) scale(${1.1-k*0.3})`; if(f.life<=0) f.el.style.opacity='0'; } }

  // booms/smoke/telegraph fade (real time)
  for(let i=booms.length-1;i>=0;i--){ const b=booms[i]; b.userData.life-=rdt; const k=b.userData.life/b.userData.max;
    if(b.userData.smoke){ b.position.addScaledVector(b.userData.v,rdt); b.scale.setScalar(1+(1-k)*2); b.material.opacity=Math.max(k,0)*0.6; if(b.userData.life<=0){ purge(b,true); scene.remove(b); booms.splice(i,1);} continue; }
    for(const p of b.children){ if(p.userData.flash){ p.material.opacity=Math.max(k,0)*0.9; p.scale.setScalar(1+(1-k)*1.5); continue; } if(p.userData.shock){ p.material.opacity=Math.max(k,0)*0.8; p.scale.setScalar(1+(1-k)*8); continue; } p.position.addScaledVector(p.userData.v,rdt); p.rotation.x+=p.userData.rot.x*rdt; p.rotation.y+=p.userData.rot.y*rdt; p.material.opacity=Math.max(k,0); }
    if(b.userData.life<=0){ purge(b,true); scene.remove(b); booms.splice(i,1); } }

  if(settings.debug){ dbgAcc+=rdt; dbgFrames++; if(dbgAcc>=0.25){ dbgFps=Math.round(dbgFrames/dbgAcc); dbgAcc=0; dbgFrames=0; }
    debugEl.textContent=`fps ${dbgFps}   state ${state}\nenemies ${enemies.length}  lasers ${lasers.length}  ebul ${ebullets.length}\nmines ${mines.length}  obst ${obstacles.length}  fx ${booms.length}\npickups ${pickups.length}  scene ${scene.children.length}\nboss ${boss?'Y':'-'}  mini ${miniboss?'Y':'-'}  fork ${forkGates?'Y':'-'}`; }

  renderer.render(scene,camera);
}

function updateEnemies(dt){ for(let i=enemies.length-1;i>=0;i--){ const e=enemies[i],u=e.userData; u.t+=dt;
  if(u.flash>0){ u.flash-=dt; e.scale.setScalar(1+u.flash*2); } else e.scale.setScalar(1);
  if(u.blink) u.blink.material.emissiveIntensity=0.6+Math.abs(Math.sin(u.t*10))*0.9;
  if(u.kamikaze){ const to=new THREE.Vector3().copy(ship.position).sub(e.position).normalize(); e.position.addScaledVector(to,28*dt*diffMul); e.position.z+=8*dt; }
  else {
    e.position.z+=(u.vz||0)*dt;
    // drift base toward playfield centre a touch so patterns stay on screen
    const tt=u.t*u.freq+u.phase, A=u.amp;
    if(u.mode==='side'){ if(u.vx) e.position.x+=u.vx*dt; e.position.y=u.baseY+Math.sin(tt)*A*0.5; }
    else switch(u.pattern){
      case 'zigzag':   e.position.x=u.baseX+(((tt/Math.PI)%2<1)?1:-1)*A*0.7; e.position.y=u.baseY+Math.sin(tt*0.7)*A*0.4; break;
      case 'circle':   e.position.x=u.baseX+Math.cos(tt)*A; e.position.y=u.baseY+Math.sin(tt)*A*0.7; break;
      case 'sineVert': e.position.y=u.baseY+Math.sin(tt)*A; e.position.x=u.baseX+Math.sin(tt*0.4)*A*0.5; break;
      case 'figure8':  e.position.x=u.baseX+Math.sin(tt)*A; e.position.y=u.baseY+Math.sin(tt*2)*A*0.5; break;
      case 'swoop':    e.position.y=u.baseY+Math.sin(tt*0.8)*A*1.1; e.position.x=u.baseX+Math.cos(tt*0.5)*A*0.8; break;
      default:         e.position.x=u.baseX+Math.sin(tt)*A; // weave
    }
    e.position.x=THREE.MathUtils.clamp(e.position.x,-AREA.x*1.6,AREA.x*1.6);
    e.position.y=THREE.MathUtils.clamp(e.position.y,AREA.yMin,AREA.yMax+1);
  }
  if(u.spin){ u.spin.rotation.y+=dt*3; u.spin.rotation.x+=dt*1.5; }
  e.lookAt(camera.position.x,e.position.y,camera.position.z);
  if(u.minelayer){ u.mineT-=dt; if(u.mineT<=0 && e.position.z<ship.position.z-10 && e.position.z>-120){ u.mineT=1.6; dropMine(e.position); } }
  if(u.shoot && e.position.z<ship.position.z-6 && e.position.z>-120){ u.shootT-=dt; if(u.shootT<=0){ u.shootT=(1.6+Math.random()*1.6)/diffMul; enemyFire(e.position,new THREE.Vector3().copy(ship.position).sub(e.position),32); } }
  if(Math.abs(e.position.z-ship.position.z)<2.2 && e.position.distanceTo(ship.position)<2.0){ explode(e.position,false); sfx.boom(); purge(e,false); scene.remove(e); enemies.splice(i,1); damage(u.kamikaze?22:14); continue; }
  if(e.position.z>28||e.position.z<-260||Math.abs(e.position.x)>42){ purge(e,false); scene.remove(e); enemies.splice(i,1); } } }

function updateMiniboss(dt){ if(!miniboss) return; const u=miniboss.userData; u.t+=dt;
  // tail-chase: stays ahead, weaves; player must shoot its rear
  miniboss.position.x=Math.sin(u.t*0.9)*5; miniboss.position.y=6+Math.sin(u.t*1.3)*1.5; miniboss.position.z=-38+Math.sin(u.t*0.6)*6;
  miniboss.rotation.z=Math.cos(u.t*0.9)*0.3; if(u.eng) u.eng.material.opacity=0.6+Math.random()*0.4;
  if(u.engGlow){ const pu=1+Math.sin(u.t*7)*0.16; u.engGlow.scale.setScalar(pu); u.engGlow.material.opacity=0.34+Math.sin(u.t*7)*0.22; } if(u.engRing){ u.engRing.rotation.z+=dt*2.4; u.engRing.scale.setScalar(1+Math.sin(u.t*7)*0.12); }
  if(u.flash>0){ u.flash-=dt; miniboss.scale.setScalar(1+u.flash*0.6); } else miniboss.scale.setScalar(1);
  u.shootT-=dt; if(u.shootT<=0){ u.shootT=1.4/diffMul; if(Math.random()<0.5) dropMine(miniboss.position); else { const wc=new THREE.Vector3().copy(miniboss.position); for(let a=-1;a<=1;a++){ const d=new THREE.Vector3().copy(ship.position).sub(wc).normalize(); d.x+=a*0.2; enemyFire(wc,d,30); } } }
  if(miniboss.position.distanceTo(ship.position)<3.5) damage(16);
  bossFill.style.width=Math.max(u.hp/u.max*100,0)+'%'; }

function updateBoss(dt,now){ if(!boss) return; const u=boss.userData; u.t+=dt;
  if(bossDying>0){ bossDying-=dt; boss.rotation.z+=dt*1.5; boss.position.y+=dt*0.5; if(Math.random()<0.5){ const p=new THREE.Vector3((Math.random()-.5)*10,(Math.random()-.5)*4,(Math.random()-.5)*6); explode(boss.position.clone().add(p),Math.random()<.4,Math.random()<.5?0xff5e9c:0xffce54); }
    if(bossDying<=0){ for(let k=0;k<6;k++) explode(boss.position.clone().add(new THREE.Vector3((Math.random()-.5)*8,(Math.random()-.5)*4,0)),true,0xffce54); sfx.bigboom(); shake(1.4); vibrate([30,30,60]); const ft=(performance.now()-(boss.userData.fightStart||performance.now()))/1000; const bp=ft<25?10:ft<50?5:3; scene.remove(boss); boss=null; bossTargets=[]; runBosses++; setScore(score+bp); floatText(ship.position.clone().add(new THREE.Vector3(0,3,-6)),'BOSS +'+bp,'#ffd24a'); endGame(true); } return; }
  if(u.mode==='arrive'){ u.arriveT+=dt; const a=Math.min(u.arriveT/u.arriveDur,1);
    boss.position.z=-330+a*260; boss.position.y=7.6-a*1.1; boss.scale.setScalar(0.55+a*0.45);
    bossWrap.style.opacity=String(Math.min(a*1.4,1)); bossFill.style.width=Math.round(a*100)+'%';
    $('bossStrobe').style.opacity=String(0.35+Math.sin(now*0.02)*0.35);
    for(const t of u.turrets) t.rotation.y=Math.sin(u.t*0.6+t.position.x)*0.5; for(const e of u.engines) e.material.opacity=0.6+Math.random()*0.4; if(u.detail) u.detail.rotation.z+=dt*1.2;
    if(a>=1){ u.mode='fight'; u.fightStart=performance.now(); bossFill.style.width='100%'; $('bossWarn').style.display='none'; $('bossStrobe').style.opacity='0'; $('screenDark').style.opacity='0'; musicIntensity=2; sfx.alarm(); shake(1.2); }
    return; }
  boss.position.x=Math.sin(u.t*0.5)*5; boss.position.y=6.5+Math.sin(u.t*0.8)*1.2;
  for(const t of u.turrets) t.rotation.y=Math.sin(u.t*0.6+t.position.x)*0.5; for(const e of u.engines) e.material.opacity=0.6+Math.random()*0.4; if(u.detail) u.detail.rotation.z+=dt*1.2;
  { const at=(u.phase===2?1:0); u.armorOpen+=(at-u.armorOpen)*Math.min(dt*3,1); for(const pv of u.armor){ pv.userData.pm.position.y=1.35+u.armorOpen*1.8; pv.rotation.z=pv.userData.baseA+u.armorOpen*0.28; } }
  for(const t of u.targets) t.part.getWorldPosition(t.position);
  u.core.rotation.y+=dt*1.5; u.core.rotation.x+=dt*0.8; u.coreShield.visible=(u.phase===1); u.coreShield.rotation.y+=dt;
  for(const p of u.pods){ if(p.userData.flash>0){ p.userData.flash-=dt; p.scale.setScalar(1+p.userData.flash*1.5);} else p.scale.setScalar(1);
    if(p.userData.hp>0){ p.userData.core.rotation.y+=dt*2; const pu=1+Math.sin(u.t*6)*0.16; if(p.userData.glow){ p.userData.glow.scale.setScalar(pu); p.userData.glow.material.opacity=0.34+Math.sin(u.t*6)*0.22; } if(p.userData.ring){ p.userData.ring.rotation.z+=dt*2.2; p.userData.ring.scale.setScalar(pu); } }
    else if(p.visible){ p.visible=false; } }
  if(u.coreGlow){ const on=u.phase===2; u.coreGlow.material.opacity=on?0.5+Math.sin(u.t*8)*0.25:0; u.coreGlow.scale.setScalar(1+Math.sin(u.t*8)*0.16); if(u.coreRing){ u.coreRing.material.opacity=on?0.9:0; u.coreRing.rotation.z+=dt*2.6; u.coreRing.scale.setScalar(1+Math.sin(u.t*8)*0.12); } }
  // telegraphed big attack
  if(u.telegraph>0){ u.telegraph-=dt; warnVig.style.opacity=(0.3+Math.sin(now*0.03)*0.25).toFixed(2); if(u.tele){ u.tele.userData.life-=dt; const kk=u.tele.userData.life/u.tele.userData.max; u.tele.scale.setScalar(1+(1-kk)*6); u.tele.material.opacity=Math.max(kk,0)*0.9; }
    if(u.telegraph<=0){ warnVig.style.opacity='0'; if(u.tele){ scene.remove(u.tele); u.tele=null; } const wc=new THREE.Vector3(); u.core.getWorldPosition(wc); for(let k=0;k<18;k++){ const a=k/18*Math.PI*2; enemyFire(wc,new THREE.Vector3(Math.cos(a),Math.sin(a),1.0),24,true); } sfx.alarm(); shake(1.0); } }
  if(u.mode==='fight' && u.telegraph<=0){ u.shootT-=dt; if(u.shootT<=0){
    if(u.phase===1){ u.shootT=1.6; for(const p of u.pods){ if(p.userData.hp>0){ const wp=new THREE.Vector3(); p.getWorldPosition(wp); for(let a=-1;a<=1;a++){ const d=new THREE.Vector3().copy(ship.position).sub(wp).normalize(); d.x+=a*0.18; enemyFire(wp,d,30,true); } } }
      if(Math.random()<0.4){ const wc=new THREE.Vector3(); u.core.getWorldPosition(wc); u.telegraph=1.0; u.tele=bossTelegraph(wc); } }
    else { u.shootT=1.2; const wc=new THREE.Vector3(); u.core.getWorldPosition(wc); const d=new THREE.Vector3().copy(ship.position).sub(wc).normalize(); enemyFire(wc,d,40,true); if(Math.random()<0.55){ u.telegraph=0.9; u.tele=bossTelegraph(wc); } } } }
  if(boss.position.distanceTo(ship.position)<4.5) damage(18); }

function updateFork(dt){ if(!forkGates) return; const f=forkGates;
  for(const side of ['left','right']){ const g=f[side]; g.position.z+=f.vz*dt; g.rotation.z+=dt*0.6; g.children[0].material.emissiveIntensity=0.6+Math.sin(performance.now()*0.006)*0.5; g.scale.setScalar(1+Math.sin(performance.now()*0.006)*0.05); }
  if(!f.resolved && f.left.position.z>ship.position.z-2){ f.resolved=true; branch=(ship.position.x>=0)?'hard':'easy'; sfx.ring(); addBranchWaves(); }
  if(f.left.position.z>26){ scene.remove(f.left); scene.remove(f.right); if(!f.resolved){ branch='easy'; addBranchWaves(); } forkGates=null; } }

function updatePickups(dt){ for(let i=pickups.length-1;i>=0;i--){ const p=pickups[i],u=p.userData; p.position.z+=u.vz*dt; u.core.rotation.z+=dt*2.2; u.ring.rotation.z-=dt*1.5; if(u.halo){ u.halo.scale.setScalar(1+Math.sin(performance.now()*0.006)*0.12); }
  if(p.position.z>-40){ p.position.x+=(ship.position.x-p.position.x)*0.6*dt; p.position.y+=(ship.position.y-p.position.y)*0.6*dt; }
  if(p.position.distanceTo(ship.position)<1.8){ if(u.kind==='health'){ health=Math.min(100,health+30); healthFill.style.width=health+'%'; showBanner('+HP'); } else if(u.kind==='laser'){ laserLevel=Math.min(3,laserLevel+1); showBanner('Laser Up'); } else { shieldTime=6; showBanner('Shield'); } updateChips(); sfx.pickup(); explode(p.position,false,0x66ffcc); scene.remove(p); pickups.splice(i,1); continue; }
  if(p.position.z>26){ scene.remove(p); pickups.splice(i,1); } } }

function updateMines(dt){ for(let i=mines.length-1;i>=0;i--){ const m=mines[i]; m.position.z+=m.userData.vz*dt; m.userData.t+=dt; m.rotation.y+=dt*2; m.rotation.x+=dt;
  if(m.position.distanceTo(ship.position)<2.2){ explode(m.position,false,0xff5aa0); sfx.boom(); purge(m,false); scene.remove(m); mines.splice(i,1); damage(12); continue; } if(m.position.z>26){ purge(m,false); scene.remove(m); mines.splice(i,1); } } }

function updateObstacles(dt){ for(let i=obstacles.length-1;i>=0;i--){ const o=obstacles[i],u=o.userData; o.position.z+=u.vz*dt;
  if(u.ring){ o.rotation.z+=dt*0.5; if(!u.passed && o.position.z>ship.position.z-1){ u.passed=true; const d=Math.hypot(o.position.x-ship.position.x,o.position.y-ship.position.y); if(d<2.6){ runRings++; sfx.ring(); explode(ship.position,false,0xffce54); } } }
  else if(u.arch){ if(!u.passed && o.position.z>ship.position.z-1){ u.passed=true; const through=Math.abs(ship.position.x-u.gapX)<(u.G-1.0);
      if(through){ archStreak++; if(archStreak>=3){ archStreak=0; spawnPickup(['health','laser','shield'][(Math.random()*3)|0], new THREE.Vector3(ship.position.x,ship.position.y,-70)); sfx.ring(); } else sfx.pickup(); } else archStreak=0; }
    if(Math.abs(o.position.z-ship.position.z)<1.6){ for(const sgn of [-1,1]){ if(Math.abs(ship.position.x-(u.gapX+sgn*u.G))<0.85){ explode(ship.position,false); sfx.boom(); damage(16); archStreak=0; } } } }
  else { if(Math.abs(o.position.z-ship.position.z)<2 && Math.hypot(o.position.x-ship.position.x,o.position.y-ship.position.y)<((u.rad||1.4)+0.3)){ explode(ship.position,false); sfx.boom(); purge(o,false); scene.remove(o); obstacles.splice(i,1); damage(18); continue; } }
  if(o.position.z>28){ purge(o,false); scene.remove(o); obstacles.splice(i,1); } } }

function updateEnemyBullets(dt){ for(let i=ebullets.length-1;i>=0;i--){ const b=ebullets[i]; b.position.addScaledVector(b.userData.dir,b.userData.speed*dt); b.userData.life-=dt;
  if(b.position.distanceTo(ship.position)<1.4){ if(invuln>0||shieldTime>0){ explode(b.position,false,0x66ffcc); sfx.hit(); } else { explode(b.position,false,pal.ebullet); damage(9); } purge(b,false); scene.remove(b); ebullets.splice(i,1); continue; }
  if(b.userData.life<=0){ purge(b,false); scene.remove(b); ebullets.splice(i,1); } } }

function updateLasers(dt){ for(let i=lasers.length-1;i>=0;i--){ const l=lasers[i],u=l.userData; const sp=u.charged?70:120;
  if(u.homing && validTarget(u.homing)){ const tp=targetPos(u.homing); const d=new THREE.Vector3().copy(tp).sub(l.position).normalize(); u.dir.lerp(d,0.22).normalize(); }
  l.position.addScaledVector(u.dir,sp*dt);
  if(!u.charged){ l.lookAt(l.position.clone().add(u.dir)); l.rotateX(Math.PI/2); if(u.lvl>=2 && Math.random()<(u.lvl>=3?0.35:0.15)) tinySpark(l.position,u.col); }
  else { if(u.r1) u.r1.rotation.z+=dt*5; if(u.r2) u.r2.rotation.y+=dt*6; if(u.spikes) u.spikes.rotation.z-=dt*3; if(u.core) u.core.scale.setScalar(1+Math.sin(performance.now()*0.02)*0.18); l.rotation.z+=dt*2; if(Math.random()<0.6) tinySpark(l.position,0x9fe0ff); }
  u.life-=dt; let done=false; const hitR=u.charged?1.4:0.9;

  if(u.charged){
    // CHARGED — heavy, pierces enemies, cracks shields/armour, clears clusters
    if(miniboss){ const ew=new THREE.Vector3(); (miniboss.userData.eng||miniboss).getWorldPosition(ew); if(l.position.distanceTo(ew)<2.6){ const mu=miniboss.userData; mu.hp-=8; mu.flash=0.14; stats.hits++; explode(l.position,true,0xffce54);
      if(mu.hp<=0){ for(let k=0;k<6;k++) explode(miniboss.position.clone().add(new THREE.Vector3((Math.random()-.5)*4,(Math.random()-.5)*3,(Math.random()-.5)*4)),true,0xffce54); sfx.bigboom(); shake(1.2); hitStop=0.1; const mt=(performance.now()-(miniboss.userData.spawnT||performance.now()))/1000; const mp=mt<15?5:mt<30?3:2; scene.remove(miniboss); miniboss=null; setScore(score+mp); musicIntensity=1; if(bossWrap && !boss) bossWrap.style.display='none'; } done=true; } }
    if(!done && boss && !boss.userData.dead && boss.userData.mode==='fight'){ if(l.position.distanceTo(boss.position)<9){ if(bossHit(true,l.position)){ explode(l.position,true,0xffce54); done=true; } } }
    if(!done) for(let j=obstacles.length-1;j>=0;j--){ const o=obstacles[j],ou=o.userData; if(ou.ring||ou.arch) continue; if(l.position.distanceTo(o.position)<hitR+ou.rad){ explode(l.position,true,0xff9060); ou.hp-=6; if(ou.hp<=0){ explode(o.position,true,0xff9060); sfx.boom(); if(ou.core) setScore(score+1); scene.remove(o); obstacles.splice(j,1); } done=true; break; } }
    if(!done) for(let j=enemies.length-1;j>=0;j--){ const e=enemies[j],eu=e.userData; if(u.hitSet.has(e)) continue; if(l.position.distanceTo(e.position)<hitR+(eu.rad||1)){
      u.hitSet.add(e); stats.hits++; if(eu.shield){ e.remove(eu.shield); eu.shield=null; eu.shieldHp=0; } eu.hp-=5; explode(l.position,true,0x8fd0ff);
      if(eu.hp<=0){ explode(e.position,true); sfx.boom(); addKill(eu.score); sfx.kill(combo); u.kills=(u.kills||0)+1; u.lastKill.copy(e.position); purge(e,false); scene.remove(e); enemies.splice(j,1); } else eu.flash=0.14; } }
    if(done||u.life<=0){ if((u.kills||0)>=2) floatText(u.lastKill,'+'+(u.kills-1),'#ffd24a'); if(u.tracks) retLock=null; scene.remove(l); lasers.splice(i,1); }
    continue;
  }

  // REGULAR — single target; blocked by enemy shields (charge only)
  if(!done && miniboss){ const ew=new THREE.Vector3(); (miniboss.userData.eng||miniboss).getWorldPosition(ew); if(l.position.distanceTo(ew)<2.4){ const mu=miniboss.userData; mu.hp-=1; mu.flash=0.12; stats.hits++; sfx.hit(); explode(l.position,false,0xffce54); done=true;
    if(mu.hp<=0){ for(let k=0;k<5;k++) explode(miniboss.position.clone().add(new THREE.Vector3((Math.random()-.5)*4,(Math.random()-.5)*3,(Math.random()-.5)*4)),true,0xffce54); sfx.bigboom(); shake(1.2); hitStop=0.08; const mt=(performance.now()-(miniboss.userData.spawnT||performance.now()))/1000; const mp=mt<15?5:mt<30?3:2; scene.remove(miniboss); miniboss=null; setScore(score+mp); musicIntensity=1; if(bossWrap && !boss) bossWrap.style.display='none'; } } }
  if(!done && boss && !boss.userData.dead && boss.userData.mode==='fight'){ if(l.position.distanceTo(boss.position)<9){ if(bossHit(false,l.position)) done=true; } }
  if(!done) for(let j=enemies.length-1;j>=0;j--){ const e=enemies[j],eu=e.userData; if(l.position.distanceTo(e.position)<hitR+(eu.rad||1)){
    if(eu.shield){ eu.flash=0.12; sfx.hit(); explode(l.position,false,0x66d0ff); done=true; break; }
    stats.hits++; eu.hp-=1;
    if(eu.hp<=0){ explode(e.position,false); sfx.boom(); addKill(eu.score); sfx.kill(combo); hitStop=Math.max(hitStop,0.03); purge(e,false); scene.remove(e); enemies.splice(j,1); }
    else { eu.flash=0.12; e.position.z-=0.4; sfx.hit(); tinySpark(l.position,0xffe0a0); }
    done=true; break; } }
  if(!done) for(let j=obstacles.length-1;j>=0;j--){ const o=obstacles[j],ou=o.userData; if(ou.ring||ou.arch) continue; if(l.position.distanceTo(o.position)<hitR+ou.rad){ ou.hp-=1; stats.hits++; explode(l.position,false,0xff9060); sfx.hit(); if(ou.hp<=0){ explode(o.position,true,0xff9060); sfx.boom(); if(ou.core) setScore(score+1); scene.remove(o); obstacles.splice(j,1); } done=true; break; } }
  if(done||u.life<=0){ if(u.tracks) retLock=null; scene.remove(l); lasers.splice(i,1); } } }

/* boss weak-point hit resolution */
function bossHit(charged,pos){ const u=boss.userData; let hit=false;
  for(const p of u.pods){ if(p.userData.hp>0){ const wp=new THREE.Vector3(); p.getWorldPosition(wp); if(pos.distanceTo(wp)<2.2){ p.userData.hp-=charged?6:1; p.userData.flash=0.12; hit=true; sfx.hit(); if(p.userData.hp<=0){ explode(wp,true,0xff5e9c); sfx.boom(); shake(0.8); hitStop=0.08; } break; } } }
  if(!hit && u.phase===2){ const wc=new THREE.Vector3(); u.core.getWorldPosition(wc); if(pos.distanceTo(wc)<3.0){ u.coreHp-=charged?6:1; u.flash=0.12; hit=true; sfx.hit(); if(charged) explode(wc,true,0xffce54); } }
  if(hit){ stats.hits++; bossFill.style.width=Math.max(bossCurHp()/bossMaxHp()*100,0)+'%'; if(u.phase===1 && u.pods.every(p=>p.userData.hp<=0)){ u.phase=2; showBanner('Core exposed!'); shake(1.2); } if(u.coreHp<=0 && !u.dead){ u.dead=true; startBossDeath(); } } return hit; }

requestAnimationFrame(tick);
addEventListener('resize',()=>{ camera.aspect=W()/H(); camera.updateProjectionMatrix(); renderer.setSize(W(),H()); });
addEventListener('keydown',e=>{ if(e.key==='p'||e.key==='Escape'){ if(state==='play') pauseGame(); else if(state==='pause') resumeGame(); } });
</script>
